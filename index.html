<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KINTA-OS v1.4</title>
<style>
body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial}
header{background:#020617;padding:14px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;gap:8px}
.app{display:grid;grid-template-columns:240px 1fr;min-height:calc(100vh - 55px)}
nav{background:#020617;border-right:1px solid #334155;padding:16px}
nav a{display:block;color:#cbd5e1;text-decoration:none;padding:10px;border-radius:10px;margin-bottom:6px}
nav a:hover,nav a.active{background:#1e293b;color:white}
main{padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin-bottom:14px}
.badge{display:inline-block;border-radius:999px;padding:5px 10px;background:#1e293b;color:#38bdf8;font-size:12px}
.muted{color:#94a3b8}.red{color:#ef4444}.yellow{color:#f59e0b}.green{color:#22c55e}.blue{color:#38bdf8}
button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;margin:4px}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:white;margin:6px 0 12px}
.floor{height:520px;background:#1e293b;border:1px solid #334155;border-radius:16px;position:relative;overflow:auto}
.eqnode{position:absolute;background:#020617;border:2px solid #38bdf8;border-radius:12px;padding:10px;width:160px;min-height:78px;color:white;text-decoration:none}
.eqnode.blocked{border-color:#ef4444}.eqnode.ready{border-color:#22c55e}.eqnode.review{border-color:#f59e0b}
pre{white-space:pre-wrap;background:#020617;border:1px solid #334155;border-radius:12px;padding:12px}
@media(max-width:800px){.app{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:6px;border-right:0;border-bottom:1px solid #334155}nav a{white-space:nowrap}.floor{height:460px}}
</style>
</head>
<body>
<header>
  <div><b>KINTA-OS v1.4</b> <span class="muted">Field Execution Edition</span></div>
  <div><button onclick="exportData()">Export Backup</button><button onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)"></div>
</header>
<div class="app"><nav id="nav"></nav><main id="view"></main></div>
<script>
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
const seed={settings:{lastBackup:"",dailyReminder:true},
projects:[
{name:"Wylie",location:"Pittsburgh, PA",health:78,status:"Active",focus:"Startup readiness, hood commissioning, health inspection readiness",milestone:"Operational readiness / health inspection path",next:"Confirm MEP readiness and hood commissioning checklist.",inspection:"2026-08-19",readiness:"2026-08-05"},
{name:"Galaxy",location:"Hillsboro, OR",health:64,status:"Permit / ANSUL",focus:"ANSUL permit comments, AOR conformance, oven suppression clarification",milestone:"ANSUL permit approval",next:"Get AOR general conformance note and oven suppression response.",inspection:"",readiness:""},
{name:"Waller Creek",location:"Austin, TX",health:71,status:"Warranty",focus:"Warranty routing and ASA coordination",milestone:"Owner warranty issue management",next:"Route equipment issues through ASA unless installation defect is confirmed.",inspection:"",readiness:""}
],
equipment:[
{item:"2170",project:"Wylie",name:"Mega Top Prep Refrigerator",manufacturer:"Kintera / TriMark",model:"KS48 / KS48Z",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",status:"Blocked - MEP verification required",deliveryStatus:"Set / verify",installStatus:"MEP pending",startupStatus:"Not ready",warrantyStatus:"Pending turnover",notes:"Verify receptacle location and startup readiness.",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely; verify packaging",elevator:"Verify",crane:"No",x:70,y:100},
{item:"2168",project:"Wylie",name:"Undercounter Freezer",manufacturer:"Kintera / TriMark",model:"KUC48F / KUC48FZ",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",status:"Ready / self-contained",deliveryStatus:"Set / verify",installStatus:"Ready",startupStatus:"No factory startup",warrantyStatus:"Pending turnover",notes:"No remote refrigeration piping required.",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely",elevator:"Verify",crane:"No",x:260,y:100},
{item:"0063",project:"Galaxy",name:"Combi Oven, Electric",manufacturer:"Alto-Shaam",model:"6-10E PRO",area:"Cookline",level:"Main",power:"208-240V/3PH",status:"Blocked - City requested suppression clarification",deliveryStatus:"Pending install coordination",installStatus:"Blocked by ANSUL permit",startupStatus:"Blocked",warrantyStatus:"Manufacturer",notes:"Use for ANSUL permit response. Architect general conformance still needed.",dimensions:"Verify from submittal",weight:"608 lb listed on schedule",doorClearance:"Verify clear path within 5 ft for install program",elevator:"Verify",crane:"No",x:80,y:300}
],
startup:[
{id:uid(),project:"Wylie",item:"2170",title:"Verify electrical receptacle and MEP readiness",discipline:"Electrical",status:"Blocked",blocker:"Field verification required"},
{id:uid(),project:"Wylie",item:"Hood",title:"Complete hood commissioning checklist",discipline:"Hood / Electrical",status:"Blocked",blocker:"Checklist must be complete before scheduling tech"},
{id:uid(),project:"Galaxy",item:"0063",title:"Resolve ANSUL permit comment for oven suppression",discipline:"Fire Suppression",status:"Blocked",blocker:"City requested clarification"},
{id:uid(),project:"Galaxy",item:"ANSUL",title:"Obtain AOR general conformance note for deferred submittal",discipline:"Architect / GC",status:"Blocked",blocker:"GC/owner must resolve AOR requirement"}
],
documents:[
{id:uid(),project:"Galaxy",name:"City ANSUL Permit Review Comments",type:"Permit / AHJ Comment",linkedItem:"0063",status:"AI Review Required",notes:"AOR general conformance and oven suppression clarification."},
{id:uid(),project:"Wylie",name:"Startup / Hood Commissioning Checklist",type:"Startup Form",linkedItem:"2170",status:"Pending",notes:"Verify hood commissioning path."}
],
actions:[
{id:uid(),project:"Galaxy",title:"Send ANSUL permit response follow-up",priority:"High",status:"Open",owner:"Rick",due:"Today"},
{id:uid(),project:"Wylie",title:"Confirm hood commissioning checklist status",priority:"High",status:"Open",owner:"Rick",due:"Today"}
],
deliveries:[
{id:uid(),project:"Wylie",item:"2170",description:"Verify received/set condition",status:"Needs check-in",damage:"Unknown",location:"Level 3",notes:"Confirm set and clear packaging."},
{id:uid(),project:"Galaxy",item:"0063",description:"Combi oven delivery/install coordination",status:"Pending",damage:"Unknown",location:"Cookline",notes:"Blocked by ANSUL permit path."}
],
punch:[
{id:uid(),project:"Wylie",item:"2170",title:"Verify MEP readiness",trade:"Electrical",status:"Open",priority:"High",notes:"Required before startup readiness."},
{id:uid(),project:"Galaxy",item:"0063",title:"Resolve ANSUL permit comment",trade:"Fire Suppression",status:"Open",priority:"High",notes:"City response pending."}
],
warranty:[
{id:uid(),project:"Waller Creek",item:"Ice machine",issue:"Owner requesting diagnosis before ASA",status:"Open",assigned:"ASA / Owner coordination",notes:"Route warranty through manufacturer authorized service agency unless installation defect identified."}
],
photos:[],logs:[],
reviews:[
{id:uid(),project:"Galaxy",title:"AOR general conformance required",summary:"City asks for AOR notation for deferred ANSUL submittal.",status:"Open",action:"Request AOR general conformance review through GC/owner."},
{id:uid(),project:"Wylie",title:"Startup blocker review",summary:"Hood commissioning and MEP readiness need verification.",status:"Open",action:"Confirm checklist completion before scheduling startup."}
]};
let db=JSON.parse(localStorage.getItem("kintaData")||"null")||seed;
function save(){localStorage.setItem("kintaData",JSON.stringify(db))}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[m]))}
function ensureArrays(){["deliveries","punch","warranty","photos","logs","actions"].forEach(k=>{if(!db[k])db[k]=[]})}
ensureArrays()
const routes=[["dashboard","Dashboard"],["daily","Daily Work"],["field","Field Mode"],["command","Project Command"],["equipment","Equipment DNA"],["delivery","Delivery"],["punch","Punch"],["warranty","Warranty"],["logistics","Logistics"],["startup","Startup"],["kitchen","Digital Kitchen"],["documents","Documents"],["photos","Photos"],["reviews","AI Review"],["brain","Project Brain"],["reports","Reports"],["settings","Settings"]];
function nav(){let r=location.hash.slice(1)||"dashboard";document.getElementById("nav").innerHTML=routes.map(x=>'<a class="'+(r==x[0]?'active':'')+'" href="#'+x[0]+'">'+x[1]+'</a>').join("")}
function stat(t,v,n,c){return '<section class="card"><h2>'+t+'</h2><p class="'+(c||'')+'" style="font-size:36px;margin:0">'+v+'</p><p class="muted">'+n+'</p></section>'}
function route(){nav();backupReminder();(views[location.hash.slice(1)||"dashboard"]||views.dashboard)()}
window.onhashchange=route;
function backupReminder(){if(!db.settings)db.settings={lastBackup:"",dailyReminder:true};let today=new Date().toISOString().slice(0,10);if(db.settings.dailyReminder&&db.settings.lastBackup!==today&&!document.getElementById("backupWarn"))setTimeout(()=>{if(document.getElementById("view"))document.getElementById("view").insertAdjacentHTML("afterbegin",'<section id="backupWarn" class="card"><b class="yellow">Backup Reminder:</b> Export your KINTA backup today. <button onclick="exportData()">Export Now</button></section>')},100)}
const views={
dashboard(){ensureArrays();let blocked=db.startup.filter(t=>t.status=="Blocked").length;let openPunch=db.punch.filter(p=>p.status!="Closed").length;let openWarranty=db.warranty.filter(w=>w.status!="Closed").length;let deliveryNeeds=db.deliveries.filter(d=>d.status!="Complete").length;view.innerHTML='<span class="badge">v1.4 Field Execution Edition</span><h1>Atlas Command Center</h1><div class="grid">'+stat("Projects",db.projects.length,"Active")+stat("Open Delivery",deliveryNeeds,"Check-in needed","yellow")+stat("Open Punch",openPunch,"Needs closeout","red")+stat("Warranty",openWarranty,"Open issues","yellow")+stat("Blocked Startup",blocked,"Action needed","red")+'</div><section class="card"><h2>Use Today</h2><button onclick="location.hash=\'field\'">Open Field Mode</button><button onclick="location.hash=\'delivery\'">Check Deliveries</button><button onclick="location.hash=\'punch\'">Open Punch</button></section>'},
daily(){view.innerHTML='<h1>Daily Work</h1><section class="card"><h2>Add Action</h2><input id="actProject" value="Wylie"><input id="actTitle" placeholder="Action item"><select id="actPriority"><option>High</option><option>Medium</option><option>Low</option></select><input id="actDue" placeholder="Today / date"><button onclick="addAction()">Save Action</button></section><div class="grid">'+db.actions.map(a=>'<section class="card"><span class="badge">'+esc(a.project)+' / '+esc(a.priority)+'</span><h2>'+esc(a.title)+'</h2><p><b>Due:</b> '+esc(a.due)+'</p><p><b>Status:</b> '+esc(a.status)+'</p><button onclick="completeAction(\''+a.id+'\')">Complete</button></section>').join("")+'</div><section class="card"><h2>Field / Meeting Log</h2><input id="logProject" value="Wylie"><textarea id="logText" placeholder="What happened today?"></textarea><button onclick="addLog()">Save Log</button></section><div>'+db.logs.slice().reverse().map(l=>'<div class="card"><span class="badge">'+esc(l.project)+' / '+esc(l.date)+'</span><p>'+esc(l.text)+'</p></div>').join("")+'</div>'},
field(){let high=[...db.startup.filter(t=>t.status=="Blocked"),...db.punch.filter(p=>p.status!="Closed"),...db.deliveries.filter(d=>d.status!="Complete")];view.innerHTML='<h1>Field Mode</h1><p class="muted">Quick view for walking the site.</p><div class="grid">'+high.map(x=>'<section class="card"><span class="badge">'+esc(x.project||"Project")+' / '+esc(x.item||"")+'</span><h2>'+esc(x.title||x.description||x.issue)+'</h2><p>'+esc(x.status||"Open")+'</p><p>'+esc(x.blocker||x.notes||"")+'</p></section>').join("")+'</div>'},
command(){view.innerHTML='<h1>Project Command Centers</h1><div class="grid">'+db.projects.map(p=>{let blocked=db.startup.filter(t=>t.project==p.name&&t.status=="Blocked").length;let eq=db.equipment.filter(e=>e.project==p.name).length;return '<section class="card"><span class="badge">'+esc(p.status)+'</span><h2>'+esc(p.name)+'</h2><p>'+esc(p.focus)+'</p><p><b>Next:</b> '+esc(p.next)+'</p><p><b>Equipment:</b> '+eq+'</p><p class="'+(blocked?'red':'green')+'"><b>Blocked:</b> '+blocked+'</p><button onclick="openProjectReport(\''+p.name+'\')">Open PM Brief</button></section>'}).join("")+'</div>'},
equipment(){view.innerHTML='<h1>Equipment DNA</h1><section class="card"><input id="eqSearch" placeholder="Search item, model, project..." oninput="renderEquipment()"><button onclick="showAddEquipment()">Add Equipment</button></section><div id="eqList"></div>';renderEquipment()},
delivery(){view.innerHTML='<h1>Delivery Check-In</h1><section class="card"><h2>Add Delivery</h2><input id="delProject" value="Wylie"><input id="delItem" placeholder="Item"><input id="delDesc" placeholder="Description"><select id="delStatus"><option>Needs check-in</option><option>Received</option><option>Damaged</option><option>Missing</option><option>Complete</option></select><input id="delLocation" placeholder="Storage/location"><textarea id="delNotes" placeholder="Notes"></textarea><button onclick="addDelivery()">Save Delivery</button></section><div class="grid">'+db.deliveries.map(d=>'<section class="card"><span class="badge">'+esc(d.project)+' / '+esc(d.item)+'</span><h2>'+esc(d.description)+'</h2><p><b>Status:</b> '+esc(d.status)+'</p><p><b>Location:</b> '+esc(d.location)+'</p><p>'+esc(d.notes)+'</p><button onclick="completeDelivery(\''+d.id+'\')">Mark Complete</button></section>').join("")+'</div>'},
punch(){view.innerHTML='<h1>Punch List</h1><section class="card"><h2>Add Punch</h2><input id="pProject" value="Wylie"><input id="pItem" placeholder="Item"><input id="pTitle" placeholder="Punch item"><input id="pTrade" placeholder="Trade"><select id="pPriority"><option>High</option><option>Medium</option><option>Low</option></select><textarea id="pNotes" placeholder="Notes"></textarea><button onclick="addPunch()">Save Punch</button></section><div class="grid">'+db.punch.map(p=>'<section class="card"><span class="badge">'+esc(p.project)+' / '+esc(p.item)+' / '+esc(p.priority)+'</span><h2>'+esc(p.title)+'</h2><p><b>Trade:</b> '+esc(p.trade)+'</p><p><b>Status:</b> '+esc(p.status)+'</p><p>'+esc(p.notes)+'</p><button onclick="closePunch(\''+p.id+'\')">Close</button></section>').join("")+'</div>'},
warranty(){view.innerHTML='<h1>Warranty / Service Log</h1><section class="card"><h2>Add Warranty Issue</h2><input id="wProject" value="Waller Creek"><input id="wItem" placeholder="Item"><input id="wIssue" placeholder="Issue"><input id="wAssigned" placeholder="ASA / manufacturer / owner"><textarea id="wNotes" placeholder="Notes"></textarea><button onclick="addWarranty()">Save Warranty Issue</button></section><div class="grid">'+db.warranty.map(w=>'<section class="card"><span class="badge">'+esc(w.project)+' / '+esc(w.item)+'</span><h2>'+esc(w.issue)+'</h2><p><b>Status:</b> '+esc(w.status)+'</p><p><b>Assigned:</b> '+esc(w.assigned)+'</p><p>'+esc(w.notes)+'</p><button onclick="closeWarranty(\''+w.id+'\')">Close</button></section>').join("")+'</div>'},
logistics(){view.innerHTML='<h1>Logistics & Clearance</h1><div class="grid">'+db.equipment.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p><b>Dimensions:</b> '+esc(e.dimensions)+'</p><p><b>Weight:</b> '+esc(e.weight)+'</p><p><b>Door:</b> '+esc(e.doorClearance)+'</p><p><b>Elevator:</b> '+esc(e.elevator)+'</p><p><b>Crane:</b> '+esc(e.crane)+'</p><button onclick="openEquipment(\''+e.item+'\')">Edit DNA</button></section>').join("")+'</div>'},
startup(){let b=db.startup.filter(t=>t.status=="Blocked").length;view.innerHTML='<h1>Startup Center</h1><div class="grid">'+stat("Tasks",db.startup.length,"Total")+stat("Blocked",b,"Need action","red")+'</div><section class="card"><h2>Add Startup Task</h2><input id="stProject" value="Wylie"><input id="stItem" placeholder="Item"><input id="stTitle" placeholder="Task"><select id="stDiscipline"><option>Electrical</option><option>Plumbing</option><option>Gas</option><option>Fire Suppression</option><option>Refrigeration</option><option>Architect / GC</option><option>Hood / Electrical</option><option>GC Coordination</option></select><select id="stStatus"><option>Blocked</option><option>Ready</option><option>Scheduled</option><option>Complete</option></select><textarea id="stBlocker" placeholder="Blocker"></textarea><button onclick="addStartup()">Save</button></section><div class="grid">'+db.startup.map(t=>'<section class="card"><span class="badge">'+esc(t.project)+' / '+esc(t.item)+'</span><h2>'+esc(t.title)+'</h2><p>'+esc(t.discipline)+'</p><p class="'+(t.status=="Blocked"?"red":"green")+'"><b>'+esc(t.status)+'</b></p><p>'+esc(t.blocker)+'</p></section>').join("")+'</div>'},
kitchen(){view.innerHTML='<h1>Digital Kitchen</h1><div class="floor">'+db.equipment.map(e=>'<a class="eqnode '+(e.status.includes("Blocked")?"blocked":e.status.includes("Ready")?"ready":"review")+'" style="left:'+e.x+'px;top:'+e.y+'px" href="#equipment" onclick="setTimeout(()=>openEquipment(\''+e.item+'\'),50)"><b>'+esc(e.item)+'</b><br>'+esc(e.name)+'<br><small>'+esc(e.status)+'</small></a>').join("")+'</div>'},
documents(){view.innerHTML='<h1>Documents</h1><section class="card"><input id="docProject" value="Wylie"><input id="docName" placeholder="Document name"><select id="docType"><option>Drawing</option><option>Equipment Schedule</option><option>Manual</option><option>Permit / AHJ Comment</option><option>Startup Form</option><option>Warranty</option><option>Photo</option></select><input id="docItem" placeholder="Linked Item"><textarea id="docNotes"></textarea><button onclick="addDocument()">Save + AI Review</button></section><div class="grid">'+db.documents.map(d=>'<section class="card"><span class="badge">'+esc(d.project)+' / '+esc(d.type)+'</span><h2>'+esc(d.name)+'</h2><p>Linked item: '+esc(d.linkedItem)+'</p><p>'+esc(d.status)+'</p><p>'+esc(d.notes)+'</p></section>').join("")+'</div>'},
photos(){view.innerHTML='<h1>Photo Register</h1><section class="card"><input id="phProject" value="Wylie"><input id="phItem" placeholder="Linked Item"><input id="phName" placeholder="Photo description"><textarea id="phNotes" placeholder="What does photo show?"></textarea><button onclick="addPhoto()">Save Photo Note</button></section><div class="grid">'+db.photos.map(p=>'<section class="card"><span class="badge">'+esc(p.project)+' / '+esc(p.item)+'</span><h2>'+esc(p.name)+'</h2><p>'+esc(p.notes)+'</p></section>').join("")+'</div>'},
reviews(){view.innerHTML='<h1>AI Review</h1><div class="grid">'+db.reviews.map(r=>'<section class="card"><span class="badge">'+esc(r.project)+'</span><h2>'+esc(r.title)+'</h2><p>'+esc(r.summary)+'</p><p><b>'+esc(r.status)+'</b></p><p>'+esc(r.action)+'</p><button onclick="closeReview(\''+r.id+'\')">Mark Complete</button></section>').join("")+'</div>'},
brain(){view.innerHTML='<h1>Project Brain</h1><section class="card"><select id="brainProject">'+db.projects.map(p=>'<option>'+p.name+'</option>').join("")+'</select><input id="brainQ" placeholder="What is blocking startup? What should I do today?"><button onclick="askBrain()">Ask</button></section><section class="card"><h2>Answer</h2><pre id="brainAnswer">Ask a question.</pre></section>'},
reports(){let b=db.startup.filter(t=>t.status=="Blocked");let p=db.punch.filter(x=>x.status!="Closed");view.innerHTML='<h1>Reports</h1><section class="card"><h2>Daily PM Brief</h2><p><b>Blocked startup:</b> '+b.length+'</p><p><b>Open punch:</b> '+p.length+'</p><ul>'+b.map(t=>'<li>'+esc(t.project)+' item '+esc(t.item)+': '+esc(t.title)+' — '+esc(t.blocker)+'</li>').join("")+'</ul><button onclick="copyReport()">Copy Report</button></section>'},
settings(){view.innerHTML='<h1>Settings</h1><section class="card"><p>Data saves to this browser local storage.</p><p><b>Last backup:</b> '+(db.settings?.lastBackup||"Never")+'</p><button onclick="exportData()">Export Backup</button><button onclick="resetData()">Reset Data</button></section>'}
};
function renderEquipment(){let q=(document.getElementById("eqSearch")?.value||"").toLowerCase();let list=db.equipment.filter(e=>JSON.stringify(e).toLowerCase().includes(q));document.getElementById("eqList").innerHTML='<div class="grid">'+list.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / Item '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p>'+esc(e.manufacturer)+' '+esc(e.model)+'</p><p><b>Status:</b> '+esc(e.status)+'</p><p><b>Delivery:</b> '+esc(e.deliveryStatus)+'</p><p><b>Startup:</b> '+esc(e.startupStatus)+'</p><button onclick="openEquipment(\''+e.item+'\')">Open / Edit</button></section>').join("")+'</div>'}
function openEquipment(item){let e=db.equipment.find(x=>x.item==item);if(!e)return;view.innerHTML='<h1>Item '+esc(e.item)+' — '+esc(e.name)+'</h1><section class="card"><input id="eName" value="'+esc(e.name)+'"><input id="eMfr" value="'+esc(e.manufacturer)+'"><input id="eModel" value="'+esc(e.model)+'"><input id="ePower" value="'+esc(e.power)+'"><input id="eDeliveryStatus" value="'+esc(e.deliveryStatus)+'"><input id="eInstallStatus" value="'+esc(e.installStatus)+'"><input id="eStartupStatus" value="'+esc(e.startupStatus)+'"><input id="eWarrantyStatus" value="'+esc(e.warrantyStatus)+'"><input id="eDimensions" value="'+esc(e.dimensions)+'"><input id="eWeight" value="'+esc(e.weight)+'"><input id="eDoor" value="'+esc(e.doorClearance)+'"><input id="eElevator" value="'+esc(e.elevator)+'"><input id="eCrane" value="'+esc(e.crane)+'"><textarea id="eStatus">'+esc(e.status)+'</textarea><textarea id="eNotes">'+esc(e.notes)+'</textarea><button onclick="saveEquipment(\''+e.item+'\')">Save Equipment</button></section>'}
function saveEquipment(item){let e=db.equipment.find(x=>x.item==item);e.name=eName.value;e.manufacturer=eMfr.value;e.model=eModel.value;e.power=ePower.value;e.deliveryStatus=eDeliveryStatus.value;e.installStatus=eInstallStatus.value;e.startupStatus=eStartupStatus.value;e.warrantyStatus=eWarrantyStatus.value;e.dimensions=eDimensions.value;e.weight=eWeight.value;e.doorClearance=eDoor.value;e.elevator=eElevator.value;e.crane=eCrane.value;e.status=eStatus.value;e.notes=eNotes.value;save();alert("Saved")}
function showAddEquipment(){view.innerHTML='<h1>Add Equipment</h1><section class="card"><input id="newProject" value="Wylie"><input id="newItem" placeholder="Item"><input id="newName" placeholder="Name"><input id="newMfr" placeholder="Manufacturer"><input id="newModel" placeholder="Model"><input id="newPower" placeholder="Power"><textarea id="newStatus">Review</textarea><button onclick="addEquipment()">Save</button></section>'}
function addEquipment(){db.equipment.push({item:newItem.value,project:newProject.value,name:newName.value,manufacturer:newMfr.value,model:newModel.value,power:newPower.value,status:newStatus.value,deliveryStatus:"Pending",installStatus:"Pending",startupStatus:"Pending",warrantyStatus:"Pending",notes:"",dimensions:"Verify",weight:"Verify",doorClearance:"Verify",elevator:"Verify",crane:"Verify",x:80,y:80});save();location.hash="equipment";route()}
function addStartup(){db.startup.push({id:uid(),project:stProject.value,item:stItem.value,title:stTitle.value,discipline:stDiscipline.value,status:stStatus.value,blocker:stBlocker.value});save();views.startup()}
function addDelivery(){db.deliveries.push({id:uid(),project:delProject.value,item:delItem.value,description:delDesc.value,status:delStatus.value,damage:"Unknown",location:delLocation.value,notes:delNotes.value});save();views.delivery()}
function completeDelivery(id){let d=db.deliveries.find(x=>x.id==id);if(d)d.status="Complete";save();views.delivery()}
function addPunch(){db.punch.push({id:uid(),project:pProject.value,item:pItem.value,title:pTitle.value,trade:pTrade.value,status:"Open",priority:pPriority.value,notes:pNotes.value});save();views.punch()}
function closePunch(id){let p=db.punch.find(x=>x.id==id);if(p)p.status="Closed";save();views.punch()}
function addWarranty(){db.warranty.push({id:uid(),project:wProject.value,item:wItem.value,issue:wIssue.value,status:"Open",assigned:wAssigned.value,notes:wNotes.value});save();views.warranty()}
function closeWarranty(id){let w=db.warranty.find(x=>x.id==id);if(w)w.status="Closed";save();views.warranty()}
function addDocument(){let d={id:uid(),project:docProject.value,name:docName.value,type:docType.value,linkedItem:docItem.value,status:"AI Review Required",notes:docNotes.value};db.documents.push(d);db.reviews.push({id:uid(),project:d.project,title:"Review "+d.name,summary:"Review "+d.type+" before committing project changes.",status:"Open",action:"Approve or reject extracted updates."});save();views.documents()}
function addPhoto(){db.photos.push({id:uid(),project:phProject.value,item:phItem.value,name:phName.value,notes:phNotes.value});save();views.photos()}
function addAction(){db.actions.push({id:uid(),project:actProject.value,title:actTitle.value,priority:actPriority.value,status:"Open",owner:"Rick",due:actDue.value});save();views.daily()}
function completeAction(id){let a=db.actions.find(x=>x.id==id);if(a)a.status="Complete";save();views.daily()}
function addLog(){db.logs.push({id:uid(),date:new Date().toLocaleString(),project:logProject.value,text:logText.value});save();views.daily()}
function closeReview(id){let r=db.reviews.find(x=>x.id==id);if(r)r.status="Complete";save();views.reviews()}
function askBrain(){let project=brainProject.value;let blocked=db.startup.filter(t=>t.project==project&&t.status=="Blocked");let punch=db.punch.filter(p=>p.project==project&&p.status!="Closed");let actions=db.actions.filter(a=>a.project==project&&a.status=="Open");brainAnswer.textContent=JSON.stringify({project,answer:project+" has "+blocked.length+" blocked startup item(s), "+punch.length+" open punch item(s), and "+actions.length+" open action(s).",openActions:actions,blockedTasks:blocked,openPunch:punch,recommendedActions:[...actions.map(a=>"Do action: "+a.title),...blocked.map(t=>"Resolve "+t.discipline+" blocker for item "+t.item+": "+t.title),...punch.map(p=>"Close punch: "+p.title)]},null,2)}
function openProjectReport(project){let blocked=db.startup.filter(t=>t.project==project&&t.status=="Blocked");let punch=db.punch.filter(p=>p.project==project&&p.status!="Closed");view.innerHTML='<h1>'+esc(project)+' PM Brief</h1><section class="card"><p>Blocked startup: '+blocked.length+'</p><p>Open punch: '+punch.length+'</p><ul>'+blocked.map(t=>'<li>'+esc(t.item)+': '+esc(t.title)+' — '+esc(t.blocker)+'</li>').join("")+'</ul></section>'}
function copyReport(){let b=db.startup.filter(t=>t.status=="Blocked");let p=db.punch.filter(x=>x.status!="Closed");let text="KINTA Daily PM Brief\n\nBlocked startup: "+b.length+"\nOpen punch: "+p.length+"\n"+b.map(t=>"- "+t.project+" item "+t.item+": "+t.title+" — "+t.blocker).join("\n");navigator.clipboard.writeText(text);alert("Copied")}
function exportData(){let today=new Date().toISOString().slice(0,10);if(!db.settings)db.settings={};db.settings.lastBackup=today;save();let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kinta-backup-"+today+".json";a.click();route()}
function importData(evt){let file=evt.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{db=JSON.parse(reader.result);ensureArrays();save();route();alert("Imported")};reader.readAsText(file)}
function resetData(){if(confirm("Reset all KINTA data?")){localStorage.removeItem("kintaData");db=JSON.parse(JSON.stringify(seed));ensureArrays();save();route()}}
route();
</script>
