<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KINTA-OS v1.3</title>
<style>
body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial}
header{background:#020617;padding:14px;border-bottom:1px solid #334155;display:flex;justify-content:space-between}
.app{display:grid;grid-template-columns:235px 1fr;min-height:calc(100vh - 55px)}
nav{background:#020617;border-right:1px solid #334155;padding:16px}
nav a{display:block;color:#cbd5e1;text-decoration:none;padding:10px;border-radius:10px;margin-bottom:6px}
nav a:hover,nav a.active{background:#1e293b;color:white}
main{padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}
.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin-bottom:14px}
.badge{display:inline-block;border-radius:999px;padding:5px 10px;background:#1e293b;color:#38bdf8;font-size:12px}
.muted{color:#94a3b8}.red{color:#ef4444}.yellow{color:#f59e0b}.green{color:#22c55e}.blue{color:#38bdf8}
button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;margin:4px}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:white;margin:6px 0 12px}
.floor{height:520px;background:#1e293b;border:1px solid #334155;border-radius:16px;position:relative;overflow:auto}
.eqnode{position:absolute;background:#020617;border:2px solid #38bdf8;border-radius:12px;padding:10px;width:160px;min-height:78px;color:white;text-decoration:none}
.eqnode.blocked{border-color:#ef4444}.eqnode.ready{border-color:#22c55e}.eqnode.review{border-color:#f59e0b}
pre{white-space:pre-wrap;background:#020617;border:1px solid #334155;border-radius:12px;padding:12px}
@media(max-width:800px){.app{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:6px;border-right:0;border-bottom:1px solid #334155}nav a{white-space:nowrap}.floor{height:460px}}
</style>
</head>
<body>
<header>
  <div><b>KINTA-OS v1.3</b> <span class="muted">Daily Work Edition</span></div>
  <div><button onclick="exportData()">Export Backup</button><button onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)"></div>
</header>
<div class="app"><nav id="nav"></nav><main id="view"></main></div>
<script>
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
const seed={settings:{lastBackup:"",dailyReminder:true},
projects:[
{name:"Wylie",location:"Pittsburgh, PA",health:78,status:"Active",focus:"Startup readiness, hood commissioning, health inspection readiness",milestone:"Operational readiness / health inspection path",next:"Confirm MEP readiness and hood commissioning checklist.",inspection:"2026-08-19",readiness:"2026-08-05"},
{name:"Galaxy",location:"Hillsboro, OR",health:64,status:"Permit / ANSUL",focus:"ANSUL permit comments, AOR conformance, oven suppression clarification",milestone:"ANSUL permit approval",next:"Get AOR general conformance note and oven suppression response.",inspection:"",readiness:""},
{name:"Waller Creek",location:"Austin, TX",health:71,status:"Warranty",focus:"Warranty routing and ASA coordination",milestone:"Owner warranty issue management",next:"Route equipment issues through ASA unless installation defect is confirmed.",inspection:"",readiness:""}
],
equipment:[
{item:"2170",project:"Wylie",name:"Mega Top Prep Refrigerator",manufacturer:"Kintera / TriMark",model:"KS48 / KS48Z",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",gas:"None",water:"None",drain:"None",startup:"No factory startup",warranty:"Pending turnover",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely; verify packaging",elevator:"Verify",crane:"No",delivery:"Set / verify",install:"MEP verification pending",status:"Blocked - MEP verification required",notes:"Verify receptacle location and startup readiness.",x:70,y:100},
{item:"2168",project:"Wylie",name:"Undercounter Freezer",manufacturer:"Kintera / TriMark",model:"KUC48F / KUC48FZ",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",gas:"None",water:"None",drain:"None",startup:"No factory startup",warranty:"Pending turnover",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely",elevator:"Verify",crane:"No",delivery:"Set / verify",install:"Ready",status:"Ready / self-contained",notes:"No remote refrigeration piping required.",x:260,y:100},
{item:"0063",project:"Galaxy",name:"Combi Oven, Electric",manufacturer:"Alto-Shaam",model:"6-10E PRO",area:"Cookline",level:"Main",power:"208-240V/3PH",gas:"None",water:"Water filter / oven connection",drain:"Verify",startup:"Factory authorized install/startup",warranty:"Manufacturer",dimensions:"Verify from submittal",weight:"608 lb listed on schedule",doorClearance:"Verify clear path within 5 ft for Alto-Shaam install program",elevator:"Verify",crane:"No",delivery:"Pending install coordination",install:"Blocked by ANSUL permit",status:"Blocked - City requested suppression clarification",notes:"Use for ANSUL permit response. Architect general conformance still needed.",x:80,y:300}
],
startup:[
{id:uid(),project:"Wylie",item:"2170",title:"Verify electrical receptacle and MEP readiness",discipline:"Electrical",status:"Blocked",blocker:"Field verification required"},
{id:uid(),project:"Wylie",item:"Hood",title:"Complete hood commissioning checklist",discipline:"Hood / Electrical",status:"Blocked",blocker:"Checklist must be complete before scheduling tech"},
{id:uid(),project:"Galaxy",item:"0063",title:"Resolve ANSUL permit comment for oven suppression",discipline:"Fire Suppression",status:"Blocked",blocker:"City requested clarification"},
{id:uid(),project:"Galaxy",item:"ANSUL",title:"Obtain AOR general conformance note for deferred submittal",discipline:"Architect / GC",status:"Blocked",blocker:"GC/owner must resolve AOR requirement"}
],
documents:[
{id:uid(),project:"Galaxy",name:"City ANSUL Permit Review Comments",type:"Permit / AHJ Comment",linkedItem:"0063",status:"AI Review Required",notes:"AOR general conformance and oven suppression clarification."},
{id:uid(),project:"Wylie",name:"Startup / Hood Commissioning Checklist",type:"Startup Form",linkedItem:"2170",status:"Pending",notes:"Verify hood commissioning path."}
],
photos:[],
actions:[
{id:uid(),project:"Galaxy",title:"Send ANSUL permit response follow-up",priority:"High",status:"Open",owner:"Rick",due:"Today"},
{id:uid(),project:"Wylie",title:"Confirm hood commissioning checklist status",priority:"High",status:"Open",owner:"Rick",due:"Today"},
{id:uid(),project:"Wylie",title:"Verify item 2170 MEP readiness",priority:"Medium",status:"Open",owner:"Rick",due:"This week"}
],
logs:[],
reviews:[
{id:uid(),project:"Galaxy",title:"AOR general conformance required",summary:"City asks for AOR notation for deferred ANSUL submittal.",status:"Open",action:"Request AOR general conformance review through GC/owner."},
{id:uid(),project:"Galaxy",title:"Alto-Shaam 0063 suppression clarification",summary:"City asked why the electric Alto-Shaam 6-10E PRO combi oven is not protected.",status:"Open",action:"Have suppression designer/design team provide technical response."},
{id:uid(),project:"Wylie",title:"Startup blocker review",summary:"Hood commissioning and MEP readiness need verification.",status:"Open",action:"Confirm checklist completion before scheduling startup."}
]};
let db=JSON.parse(localStorage.getItem("kintaData")||"null")||seed;
function save(){localStorage.setItem("kintaData",JSON.stringify(db))}
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[m]))}
const routes=[["dashboard","Dashboard"],["daily","Daily Work"],["command","Project Command"],["equipment","Equipment DNA"],["logistics","Logistics"],["startup","Startup"],["kitchen","Digital Kitchen"],["documents","Documents"],["photos","Photos"],["reviews","AI Review"],["brain","Project Brain"],["reports","Reports"],["settings","Settings"]];
function nav(){let r=location.hash.slice(1)||"dashboard";document.getElementById("nav").innerHTML=routes.map(x=>'<a class="'+(r==x[0]?'active':'')+'" href="#'+x[0]+'">'+x[1]+'</a>').join("")}
function stat(t,v,n,c){return '<section class="card"><h2>'+t+'</h2><p class="'+(c||'')+'" style="font-size:36px;margin:0">'+v+'</p><p class="muted">'+n+'</p></section>'}
function daysUntil(d){if(!d)return "";return Math.ceil((new Date(d+"T00:00:00")-new Date())/(1000*60*60*24))}
function backupReminder(){if(!db.settings)db.settings={lastBackup:"",dailyReminder:true};let today=new Date().toISOString().slice(0,10);if(db.settings.dailyReminder&&db.settings.lastBackup!==today&&!document.getElementById("backupWarn"))setTimeout(()=>{if(document.getElementById("view"))document.getElementById("view").insertAdjacentHTML("afterbegin",'<section id="backupWarn" class="card"><b class="yellow">Backup Reminder:</b> Export your KINTA backup today. <button onclick="exportData()">Export Now</button></section>')},100)}
function route(){nav();backupReminder();(views[location.hash.slice(1)||"dashboard"]||views.dashboard)()}
window.onhashchange=route;
const views={
dashboard(){let b=db.startup.filter(t=>t.status=="Blocked").length;let open=(db.actions||[]).filter(a=>a.status=="Open").length;view.innerHTML='<span class="badge">v1.3 Daily Work Edition</span><h1>Atlas Command Center</h1><p class="muted">Daily PM workspace with actions, logistics, startup, and Project Brain.</p><div class="grid">'+stat("Projects",db.projects.length,"Active")+stat("Equipment",db.equipment.length,"DNA records")+stat("Open Actions",open,"Daily work","yellow")+stat("Blocked Startup",b,"Action needed","red")+stat("AI Review",db.reviews.filter(r=>r.status=="Open").length,"Open","yellow")+'</div><section class="card"><h2>Today Focus</h2><ul><li>Galaxy: close ANSUL permit responses and AOR conformance note.</li><li>Wylie: track MEP/startup readiness and hood commissioning.</li><li>Back up KINTA at end of day.</li></ul></section>'},
daily(){view.innerHTML='<h1>Daily Work</h1><section class="card"><h2>Add Action</h2><input id="actProject" value="Wylie"><input id="actTitle" placeholder="Action item"><select id="actPriority"><option>High</option><option>Medium</option><option>Low</option></select><input id="actDue" placeholder="Today / date"><button onclick="addAction()">Save Action</button></section><div class="grid">'+(db.actions||[]).map(a=>'<section class="card"><span class="badge">'+esc(a.project)+' / '+esc(a.priority)+'</span><h2>'+esc(a.title)+'</h2><p><b>Due:</b> '+esc(a.due)+'</p><p><b>Status:</b> '+esc(a.status)+'</p><button onclick="completeAction(\''+a.id+'\')">Complete</button></section>').join("")+'</div><section class="card"><h2>Field / Meeting Log</h2><input id="logProject" value="Wylie"><textarea id="logText" placeholder="What happened today?"></textarea><button onclick="addLog()">Save Log</button></section><div>'+(db.logs||[]).slice().reverse().map(l=>'<div class="card"><span class="badge">'+esc(l.project)+' / '+esc(l.date)+'</span><p>'+esc(l.text)+'</p></div>').join("")+'</div>'},
command(){view.innerHTML='<h1>Project Command Centers</h1><div class="grid">'+db.projects.map(p=>{let blocked=db.startup.filter(t=>t.project==p.name&&t.status=="Blocked").length;let eq=db.equipment.filter(e=>e.project==p.name).length;let insp=daysUntil(p.inspection);let ready=daysUntil(p.readiness);return '<section class="card"><span class="badge">'+esc(p.status)+'</span><h2>'+esc(p.name)+'</h2><p>'+esc(p.focus)+'</p><p><b>Next:</b> '+esc(p.next)+'</p>'+(ready!==""?'<p class="blue"><b>Readiness:</b> '+ready+' days</p>':'')+(insp!==""?'<p class="yellow"><b>Inspection:</b> '+insp+' days</p>':'')+'<p><b>Equipment:</b> '+eq+'</p><p class="'+(blocked?'red':'green')+'"><b>Blocked:</b> '+blocked+'</p><button onclick="openProjectReport(\''+p.name+'\')">Open PM Brief</button></section>'}).join("")+'</div>'},
equipment(){view.innerHTML='<h1>Equipment DNA</h1><section class="card"><input id="eqSearch" placeholder="Search item, model, project..." oninput="renderEquipment()"><button onclick="showAddEquipment()">Add Equipment</button></section><div id="eqList"></div>';renderEquipment()},
logistics(){view.innerHTML='<h1>Logistics & Clearance</h1><p class="muted">Flag large equipment, door/elevator/crane needs, and delivery risks.</p><div class="grid">'+db.equipment.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p><b>Dimensions:</b> '+esc(e.dimensions)+'</p><p><b>Weight:</b> '+esc(e.weight)+'</p><p><b>Door:</b> '+esc(e.doorClearance)+'</p><p><b>Elevator:</b> '+esc(e.elevator)+'</p><p><b>Crane:</b> '+esc(e.crane)+'</p><p><b>Delivery:</b> '+esc(e.delivery)+'</p><p><b>Install:</b> '+esc(e.install)+'</p><button onclick="openEquipment(\''+e.item+'\')">Edit DNA</button></section>').join("")+'</div>'},
startup(){let b=db.startup.filter(t=>t.status=="Blocked").length;view.innerHTML='<h1>Startup Center</h1><div class="grid">'+stat("Tasks",db.startup.length,"Total")+stat("Blocked",b,"Need action","red")+'</div><section class="card"><h2>Add Startup Task</h2><input id="stProject" value="Wylie"><input id="stItem" placeholder="Item"><input id="stTitle" placeholder="Task"><select id="stDiscipline"><option>Electrical</option><option>Plumbing</option><option>Gas</option><option>Fire Suppression</option><option>Refrigeration</option><option>Architect / GC</option><option>Hood / Electrical</option><option>GC Coordination</option></select><select id="stStatus"><option>Blocked</option><option>Ready</option><option>Scheduled</option><option>Complete</option></select><textarea id="stBlocker" placeholder="Blocker"></textarea><button onclick="addStartup()">Save</button></section><div class="grid">'+db.startup.map(t=>'<section class="card"><span class="badge">'+esc(t.project)+' / '+esc(t.item)+'</span><h2>'+esc(t.title)+'</h2><p>'+esc(t.discipline)+'</p><p class="'+(t.status=="Blocked"?"red":"green")+'"><b>'+esc(t.status)+'</b></p><p>'+esc(t.blocker)+'</p></section>').join("")+'</div>'},
kitchen(){view.innerHTML='<h1>Digital Kitchen</h1><p class="muted">Tap equipment to open its record.</p><div class="floor">'+db.equipment.map(e=>'<a class="eqnode '+(e.status.includes("Blocked")?"blocked":e.status.includes("Ready")?"ready":"review")+'" style="left:'+e.x+'px;top:'+e.y+'px" href="#equipment" onclick="setTimeout(()=>openEquipment(\''+e.item+'\'),50)"><b>'+esc(e.item)+'</b><br>'+esc(e.name)+'<br><small>'+esc(e.status)+'</small></a>').join("")+'</div>'},
documents(){view.innerHTML='<h1>Documents</h1><section class="card"><h2>Add Document Record</h2><input id="docProject" value="Wylie"><input id="docName" placeholder="Document name"><select id="docType"><option>Drawing</option><option>Equipment Schedule</option><option>Manual</option><option>Permit / AHJ Comment</option><option>Startup Form</option><option>Warranty</option><option>Photo</option></select><input id="docItem" placeholder="Linked Item"><textarea id="docNotes"></textarea><button onclick="addDocument()">Save + AI Review</button></section><div class="grid">'+db.documents.map(d=>'<section class="card"><span class="badge">'+esc(d.project)+' / '+esc(d.type)+'</span><h2>'+esc(d.name)+'</h2><p>Linked item: '+esc(d.linkedItem)+'</p><p>'+esc(d.status)+'</p><p>'+esc(d.notes)+'</p></section>').join("")+'</div>'},
photos(){view.innerHTML='<h1>Photo Register</h1><section class="card"><h2>Add Photo Note</h2><p class="muted">Full image upload comes with cloud storage.</p><input id="phProject" value="Wylie"><input id="phItem" placeholder="Linked Item"><input id="phName" placeholder="Photo description"><textarea id="phNotes" placeholder="What does photo show?"></textarea><button onclick="addPhoto()">Save Photo Note</button></section><div class="grid">'+(db.photos||[]).map(p=>'<section class="card"><span class="badge">'+esc(p.project)+' / '+esc(p.item)+'</span><h2>'+esc(p.name)+'</h2><p>'+esc(p.notes)+'</p></section>').join("")+'</div>'},
reviews(){view.innerHTML='<h1>AI Review</h1><div class="grid">'+db.reviews.map(r=>'<section class="card"><span class="badge">'+esc(r.project)+'</span><h2>'+esc(r.title)+'</h2><p>'+esc(r.summary)+'</p><p><b>'+esc(r.status)+'</b></p><p>'+esc(r.action)+'</p><button onclick="closeReview(\''+r.id+'\')">Mark Complete</button></section>').join("")+'</div>'},
brain(){view.innerHTML='<h1>Project Brain</h1><section class="card"><select id="brainProject">'+db.projects.map(p=>'<option>'+p.name+'</option>').join("")+'</select><input id="brainQ" placeholder="What is blocking startup? What should I do today?"><button onclick="askBrain()">Ask</button></section><section class="card"><h2>Answer</h2><pre id="brainAnswer">Ask a question.</pre></section>'},
reports(){let b=db.startup.filter(t=>t.status=="Blocked");view.innerHTML='<h1>Reports</h1><section class="card"><h2>Daily PM Brief</h2><p><b>Blocked startup items:</b> '+b.length+'</p><ul>'+b.map(t=>'<li>'+esc(t.project)+' item '+esc(t.item)+': '+esc(t.title)+' — '+esc(t.blocker)+'</li>').join("")+'</ul><button onclick="copyReport()">Copy Report</button></section>'},
settings(){view.innerHTML='<h1>Settings</h1><section class="card"><p>Data saves to this browser local storage.</p><p><b>Last backup:</b> '+(db.settings?.lastBackup||"Never")+'</p><button onclick="exportData()">Export Backup</button><button onclick="resetData()">Reset Data</button></section>'}
};
function renderEquipment(){let q=(document.getElementById("eqSearch")?.value||"").toLowerCase();let list=db.equipment.filter(e=>JSON.stringify(e).toLowerCase().includes(q));document.getElementById("eqList").innerHTML='<div class="grid">'+list.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / Item '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p>'+esc(e.manufacturer)+' '+esc(e.model)+'</p><p><b>Level/Area:</b> '+esc(e.level)+' / '+esc(e.area)+'</p><p><b>Power:</b> '+esc(e.power)+'</p><p><b>Status:</b> '+esc(e.status)+'</p><p>'+esc(e.notes)+'</p><button onclick="openEquipment(\''+e.item+'\')">Open / Edit</button></section>').join("")+'</div>'}
function openEquipment(item){let e=db.equipment.find(x=>x.item==item);if(!e)return;view.innerHTML='<h1>Item '+esc(e.item)+' — '+esc(e.name)+'</h1><section class="card"><input id="eName" value="'+esc(e.name)+'"><input id="eMfr" value="'+esc(e.manufacturer)+'"><input id="eModel" value="'+esc(e.model)+'"><input id="ePower" value="'+esc(e.power)+'"><input id="eDimensions" value="'+esc(e.dimensions)+'"><input id="eWeight" value="'+esc(e.weight)+'"><input id="eDoor" value="'+esc(e.doorClearance)+'"><input id="eElevator" value="'+esc(e.elevator)+'"><input id="eCrane" value="'+esc(e.crane)+'"><input id="eDelivery" value="'+esc(e.delivery)+'"><input id="eInstall" value="'+esc(e.install)+'"><textarea id="eStatus">'+esc(e.status)+'</textarea><textarea id="eNotes">'+esc(e.notes)+'</textarea><button onclick="saveEquipment(\''+e.item+'\')">Save Equipment</button></section>'}
function saveEquipment(item){let e=db.equipment.find(x=>x.item==item);e.name=eName.value;e.manufacturer=eMfr.value;e.model=eModel.value;e.power=ePower.value;e.dimensions=eDimensions.value;e.weight=eWeight.value;e.doorClearance=eDoor.value;e.elevator=eElevator.value;e.crane=eCrane.value;e.delivery=eDelivery.value;e.install=eInstall.value;e.status=eStatus.value;e.notes=eNotes.value;save();alert("Saved")}
function showAddEquipment(){view.innerHTML='<h1>Add Equipment</h1><section class="card"><input id="newProject" value="Wylie"><input id="newItem" placeholder="Item"><input id="newName" placeholder="Name"><input id="newMfr" placeholder="Manufacturer"><input id="newModel" placeholder="Model"><input id="newPower" placeholder="Power"><textarea id="newStatus">Review</textarea><button onclick="addEquipment()">Save</button></section>'}
function addEquipment(){db.equipment.push({item:newItem.value,project:newProject.value,name:newName.value,manufacturer:newMfr.value,model:newModel.value,power:newPower.value,status:newStatus.value,notes:"",dimensions:"Verify",weight:"Verify",doorClearance:"Verify",elevator:"Verify",crane:"Verify",delivery:"Pending",install:"Pending",x:80,y:80});save();location.hash="equipment";route()}
function addStartup(){db.startup.push({id:uid(),project:stProject.value,item:stItem.value,title:stTitle.value,discipline:stDiscipline.value,status:stStatus.value,blocker:stBlocker.value});save();views.startup()}
function addDocument(){let d={id:uid(),project:docProject.value,name:docName.value,type:docType.value,linkedItem:docItem.value,status:"AI Review Required",notes:docNotes.value};db.documents.push(d);db.reviews.push({id:uid(),project:d.project,title:"Review "+d.name,summary:"Review "+d.type+" before committing project changes.",status:"Open",action:"Approve or reject extracted updates."});save();views.documents()}
function addPhoto(){if(!db.photos)db.photos=[];db.photos.push({id:uid(),project:phProject.value,item:phItem.value,name:phName.value,notes:phNotes.value});save();views.photos()}
function addAction(){if(!db.actions)db.actions=[];db.actions.push({id:uid(),project:actProject.value,title:actTitle.value,priority:actPriority.value,status:"Open",owner:"Rick",due:actDue.value});save();views.daily()}
function completeAction(id){let a=db.actions.find(x=>x.id==id);if(a)a.status="Complete";save();views.daily()}
function addLog(){if(!db.logs)db.logs=[];db.logs.push({id:uid(),date:new Date().toLocaleString(),project:logProject.value,text:logText.value});save();views.daily()}
function closeReview(id){let r=db.reviews.find(x=>x.id==id);if(r)r.status="Complete";save();views.reviews()}
function askBrain(){let project=brainProject.value;let blocked=db.startup.filter(t=>t.project==project&&t.status=="Blocked");let actions=(db.actions||[]).filter(a=>a.project==project&&a.status=="Open");brainAnswer.textContent=JSON.stringify({project,answer:blocked.length?project+" has "+blocked.length+" blocked startup item(s).":project+" has no blocked startup tasks.",openActions:actions,blockedTasks:blocked,recommendedActions:[...actions.map(a=>"Do action: "+a.title),...blocked.map(t=>"Resolve "+t.discipline+" blocker for item "+t.item+": "+t.title)]},null,2)}
function openProjectReport(project){let blocked=db.startup.filter(t=>t.project==project&&t.status=="Blocked");let actions=(db.actions||[]).filter(a=>a.project==project&&a.status=="Open");view.innerHTML='<h1>'+esc(project)+' PM Brief</h1><section class="card"><p>Open actions: '+actions.length+'</p><p class="'+(blocked.length?'red':'green')+'">Blocked items: '+blocked.length+'</p><ul>'+blocked.map(t=>'<li>'+esc(t.item)+': '+esc(t.title)+' — '+esc(t.blocker)+'</li>').join("")+'</ul></section>'}
function copyReport(){let b=db.startup.filter(t=>t.status=="Blocked");let text="KINTA Daily PM Brief\n\nBlocked startup items: "+b.length+"\n"+b.map(t=>"- "+t.project+" item "+t.item+": "+t.title+" — "+t.blocker).join("\n");navigator.clipboard.writeText(text);alert("Copied")}
function exportData(){let today=new Date().toISOString().slice(0,10);if(!db.settings)db.settings={};db.settings.lastBackup=today;save();let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kinta-backup-"+today+".json";a.click();route()}
function importData(evt){let file=evt.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=()=>{db=JSON.parse(reader.result);save();route();alert("Imported")};reader.readAsText(file)}
function resetData(){if(confirm("Reset all KINTA data?")){localStorage.removeItem("kintaData");db=JSON.parse(JSON.stringify(seed));save();route()}}
route();
</script></body></html>
