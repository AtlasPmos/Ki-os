<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KINTA-OS v2.0</title>
<style>
body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial}
header{background:#020617;padding:14px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;gap:8px}
.app{display:grid;grid-template-columns:245px 1fr;min-height:calc(100vh - 55px)}
nav{background:#020617;border-right:1px solid #334155;padding:16px}
nav a{display:block;color:#cbd5e1;text-decoration:none;padding:10px;border-radius:10px;margin-bottom:6px}
nav a:hover,nav a.active{background:#1e293b;color:white}
main{padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:14px}
.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin-bottom:14px}
.badge{display:inline-block;border-radius:999px;padding:5px 10px;background:#1e293b;color:#38bdf8;font-size:12px}
.muted{color:#94a3b8}.red{color:#ef4444}.yellow{color:#f59e0b}.green{color:#22c55e}.blue{color:#38bdf8}
button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;margin:4px}
button.gray{background:#334155}button.redbtn{background:#dc2626}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:white;margin:6px 0 12px}
.floor{height:520px;background:#1e293b;border:1px solid #334155;border-radius:16px;position:relative;overflow:auto}
.eqnode{position:absolute;background:#020617;border:2px solid #38bdf8;border-radius:12px;padding:10px;width:160px;min-height:78px;color:white;text-decoration:none}
.eqnode.blocked{border-color:#ef4444}.eqnode.ready{border-color:#22c55e}.eqnode.review{border-color:#f59e0b}
pre{white-space:pre-wrap;background:#020617;border:1px solid #334155;border-radius:12px;padding:12px}
.progress{height:12px;background:#020617;border:1px solid #334155;border-radius:999px;overflow:hidden}.bar{height:100%;background:#22c55e}
@media(max-width:800px){.app{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:6px;border-right:0;border-bottom:1px solid #334155}nav a{white-space:nowrap}.floor{height:460px}}
</style>
</head>
<body>
<header>
  <div><b>KINTA-OS v2.0</b> <span class="muted">Protected Data Edition</span></div>
  <div><button onclick="exportData()">Export Backup</button><button onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)"></div>
</header>
<div class="app"><nav id="nav"></nav><main id="view"></main></div>
<script>
const APP_VERSION="2.0.0";
const DATA_KEY="kintaData";
const SNAPSHOT_KEY="kintaSnapshots";
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
const seed={meta:{appVersion:APP_VERSION,dataVersion:2,lastMigration:""},settings:{lastBackup:"",dailyReminder:true,autoSnapshot:true},
projects:[
{name:"Wylie",location:"Pittsburgh, PA",health:78,status:"Active",focus:"Startup readiness, hood commissioning, health inspection readiness",milestone:"Operational readiness / health inspection path",next:"Confirm MEP readiness and hood commissioning checklist.",inspection:"2026-08-19",readiness:"2026-08-05"},
{name:"Galaxy",location:"Hillsboro, OR",health:64,status:"Permit / ANSUL",focus:"ANSUL permit comments, AOR conformance, oven suppression clarification",milestone:"ANSUL permit approval",next:"Get AOR general conformance note and oven suppression response.",inspection:"",readiness:""},
{name:"Waller Creek",location:"Austin, TX",health:71,status:"Warranty",focus:"Warranty routing and ASA coordination",milestone:"Owner warranty issue management",next:"Route equipment issues through ASA unless installation defect is confirmed.",inspection:"",readiness:""}
],
equipment:[
{item:"2170",project:"Wylie",name:"Mega Top Prep Refrigerator",manufacturer:"Kintera / TriMark",model:"KS48 / KS48Z",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",status:"Blocked - MEP verification required",deliveryStatus:"Set / verify",installStatus:"MEP pending",startupStatus:"Not ready",warrantyStatus:"Pending turnover",notes:"Verify receptacle location and startup readiness.",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely; verify packaging",elevator:"Verify",crane:"No",x:70,y:100},
{item:"2168",project:"Wylie",name:"Undercounter Freezer",manufacturer:"Kintera / TriMark",model:"KUC48F / KUC48FZ",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",status:"Ready / self-contained",deliveryStatus:"Set / verify",installStatus:"Ready",startupStatus:"No factory startup",warrantyStatus:"Pending turnover",notes:"No remote refrigeration piping required.",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely",elevator:"Verify",crane:"No",x:260,y:100},
{item:"0063",project:"Galaxy",name:"Combi Oven, Electric",manufacturer:"Alto-Shaam",model:"6-10E PRO",area:"Cookline",level:"Main",power:"208-240V/3PH",status:"Blocked - City requested suppression clarification",deliveryStatus:"Pending install coordination",installStatus:"Blocked by ANSUL permit",startupStatus:"Blocked",warrantyStatus:"Manufacturer",notes:"Use for ANSUL permit response. Architect general conformance still needed.",dimensions:"Verify from submittal",weight:"608 lb listed on schedule",doorClearance:"Verify clear path within 5 ft for install program",elevator:"Verify",crane:"No",x:80,y:300}
],
startup:[
{id:uid(),project:"Wylie",item:"2170",title:"Verify electrical receptacle and MEP readiness",discipline:"Electrical",status:"Blocked",blocker:"Field verification required"},
{id:uid(),project:"Wylie",item:"Hood",title:"Complete hood commissioning checklist",discipline:"Hood / Electrical",status:"Blocked",blocker:"Checklist must be complete before scheduling tech"},
{id:uid(),project:"Galaxy",item:"0063",title:"Resolve ANSUL permit comment for oven suppression",discipline:"Fire Suppression",status:"Blocked",blocker:"City requested clarification"},
{id:uid(),project:"Galaxy",item:"ANSUL",title:"Obtain AOR general conformance note for deferred submittal",discipline:"Architect / GC",status:"Blocked",blocker:"GC/owner must resolve AOR requirement"}
],
documents:[
{id:uid(),project:"Galaxy",name:"City ANSUL Permit Review Comments",type:"Permit / AHJ Comment",linkedItem:"0063",status:"AI Review Required",notes:"AOR general conformance and oven suppression clarification."},
{id:uid(),project:"Wylie",name:"Startup / Hood Commissioning Checklist",type:"Startup Form",linkedItem:"2170",status:"Pending",notes:"Verify hood commissioning path."}
],
actions:[
{id:uid(),project:"Galaxy",title:"Send ANSUL permit response follow-up",priority:"High",status:"Open",owner:"Rick",due:"Today"},
{id:uid(),project:"Wylie",title:"Confirm hood commissioning checklist status",priority:"High",status:"Open",owner:"Rick",due:"Today"}
],
deliveries:[], punch:[], warranty:[], photos:[], logs:[],
closeout:[
{id:uid(),project:"Wylie",title:"O&M manuals",status:"Missing",owner:"TriMark",notes:"Collect by equipment."},
{id:uid(),project:"Wylie",title:"Startup forms",status:"Missing",owner:"TriMark / ASA",notes:"Required for turnover."},
{id:uid(),project:"Wylie",title:"Warranty letter",status:"Pending",owner:"TriMark",notes:"Provide at turnover."},
{id:uid(),project:"Galaxy",title:"ANSUL permit approval",status:"Blocked",owner:"GC / Fire Suppression",notes:"City comments open."}
],
reviews:[
{id:uid(),project:"Galaxy",title:"AOR general conformance required",summary:"City asks for AOR notation for deferred ANSUL submittal.",status:"Open",action:"Request AOR general conformance review through GC/owner."},
{id:uid(),project:"Wylie",title:"Startup blocker review",summary:"Hood commissioning and MEP readiness need verification.",status:"Open",action:"Confirm checklist completion before scheduling startup."}
]};

function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function getSnapshots(){return JSON.parse(localStorage.getItem(SNAPSHOT_KEY)||"[]")}
function setSnapshots(s){localStorage.setItem(SNAPSHOT_KEY,JSON.stringify(s.slice(-10)))}
function createSnapshot(reason){
  if(!db || !db.settings || db.settings.autoSnapshot===false) return;
  let s=getSnapshots();
  s.push({id:uid(),date:new Date().toLocaleString(),reason:reason||"Auto snapshot",data:deepCopy(db)});
  setSnapshots(s);
}
function loadDb(){
  let raw=localStorage.getItem(DATA_KEY);
  if(!raw) return deepCopy(seed);
  try{return JSON.parse(raw)}catch(e){return deepCopy(seed)}
}
let db=loadDb();
function migrateData(){
  let changed=false;
  if(!db.meta){db.meta={appVersion:APP_VERSION,dataVersion:1,lastMigration:"added meta"};changed=true}
  if(!db.settings){db.settings={lastBackup:"",dailyReminder:true,autoSnapshot:true};changed=true}
  ["projects","equipment","startup","documents","actions","deliveries","punch","warranty","photos","logs","closeout","reviews"].forEach(k=>{if(!db[k]){db[k]=[];changed=true}})
  db.equipment.forEach(e=>{["deliveryStatus","installStatus","startupStatus","warrantyStatus","dimensions","weight","doorClearance","elevator","crane","notes"].forEach(k=>{if(e[k]===undefined){e[k]="Verify";changed=true}}); if(!e.x){e.x=80;changed=true} if(!e.y){e.y=80;changed=true}})
  db.meta.appVersion=APP_VERSION; db.meta.dataVersion=2; db.meta.lastMigration=new Date().toLocaleString();
  if(changed) save("Migration snapshot");
}
function save(reason){localStorage.setItem(DATA_KEY,JSON.stringify(db));}
migrateData();
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[m]))}
const routes=[["dashboard","Dashboard"],["brain","Project Brain"],["readiness","Readiness"],["closeout","Closeout"],["daily","Daily Work"],["field","Field Mode"],["equipment","Equipment DNA"],["startup","Startup"],["delivery","Delivery"],["punch","Punch"],["warranty","Warranty"],["kitchen","Digital Kitchen"],["documents","Documents"],["snapshots","Backups"],["reports","Reports"],["settings","Settings"]];
function nav(){let r=location.hash.slice(1)||"dashboard";document.getElementById("nav").innerHTML=routes.map(x=>'<a class="'+(r==x[0]?'active':'')+'" href="#'+x[0]+'">'+x[1]+'</a>').join("")}
function stat(t,v,n,c){return '<section class="card"><h2>'+t+'</h2><p class="'+(c||'')+'" style="font-size:36px;margin:0">'+v+'</p><p class="muted">'+n+'</p></section>'}
function route(){nav();backupReminder();(views[location.hash.slice(1)||"dashboard"]||views.dashboard)()}
window.onhashchange=route;
function backupReminder(){let today=new Date().toISOString().slice(0,10);if(db.settings.dailyReminder&&db.settings.lastBackup!==today&&!document.getElementById("backupWarn"))setTimeout(()=>{if(document.getElementById("view"))document.getElementById("view").insertAdjacentHTML("afterbegin",'<section id="backupWarn" class="card"><b class="yellow">Backup Reminder:</b> Export your KINTA backup today. <button onclick="exportData()">Export Now</button></section>')},100)}
function projectStats(project){let eq=db.equipment.filter(e=>e.project==project);let blocked=db.startup.filter(t=>t.project==project&&t.status=="Blocked");let punch=db.punch.filter(p=>p.project==project&&p.status!="Closed");let close=db.closeout.filter(c=>c.project==project&&c.status!="Complete");let docs=db.documents.filter(d=>d.project==project);let actions=db.actions.filter(a=>a.project==project&&a.status=="Open");let ready=Math.max(0,100-(blocked.length*20)-(punch.length*10)-(close.length*8));return{eq,blocked,punch,close,docs,actions,ready}}
function missingDocs(project){let required=["O&M","Startup","Warranty","Permit"];let docs=db.documents.filter(d=>d.project==project).map(d=>(d.name+" "+d.type).toLowerCase());return required.filter(r=>!docs.some(d=>d.includes(r.toLowerCase())))}
const views={
dashboard(){let blocked=db.startup.filter(t=>t.status=="Blocked").length;let openPunch=db.punch.filter(p=>p.status!="Closed").length;let closeOpen=db.closeout.filter(c=>c.status!="Complete").length;view.innerHTML='<span class="badge">v2.0 Protected Data Edition</span><h1>Atlas Command Center</h1><p class="muted">Includes data migration, local snapshots, restore tools, and safer update path.</p><div class="grid">'+stat("Projects",db.projects.length,"Active")+stat("Blocked Startup",blocked,"Action needed","red")+stat("Open Punch",openPunch,"Needs closeout","red")+stat("Closeout Open",closeOpen,"Turnover risk","yellow")+stat("Snapshots",getSnapshots().length,"Local restore points","blue")+'</div><section class="card"><h2>Protected Data</h2><p>Version: '+esc(db.meta?.appVersion)+' | Last migration: '+esc(db.meta?.lastMigration)+'</p><button onclick="createSnapshot(\'Manual snapshot\'); route()">Create Snapshot</button><button onclick="location.hash=\'snapshots\'">Restore Tools</button></section>'},
brain(){view.innerHTML='<h1>Project Brain</h1><section class="card"><select id="brainProject">'+db.projects.map(p=>'<option>'+p.name+'</option>').join("")+'</select><input id="brainQ" placeholder="What am I forgetting? What is blocking startup?"><button onclick="askBrain()">Ask</button></section><section class="card"><h2>Answer</h2><pre id="brainAnswer">Ask a question.</pre></section>'},
readiness(){view.innerHTML='<h1>Project Readiness</h1><div class="grid">'+db.projects.map(p=>{let s=projectStats(p.name);return '<section class="card"><h2>'+esc(p.name)+'</h2><p><b>Readiness:</b> '+s.ready+'%</p><div class="progress"><div class="bar" style="width:'+s.ready+'%"></div></div><p class="'+(s.blocked.length?'red':'green')+'">Blocked startup: '+s.blocked.length+'</p><p>Open punch: '+s.punch.length+'</p><p>Open closeout: '+s.close.length+'</p><p>Missing docs: '+missingDocs(p.name).join(", ")+'</p></section>'}).join("")+'</div>'},
closeout(){view.innerHTML='<h1>Closeout Tracker</h1><section class="card"><h2>Add Closeout Item</h2><input id="coProject" value="Wylie"><input id="coTitle" placeholder="O&M, startup form, warranty, permit..."><select id="coStatus"><option>Missing</option><option>Pending</option><option>Blocked</option><option>Complete</option></select><input id="coOwner" placeholder="Owner"><textarea id="coNotes" placeholder="Notes"></textarea><button onclick="addCloseout()">Save</button></section><div class="grid">'+db.closeout.map(c=>'<section class="card"><span class="badge">'+esc(c.project)+' / '+esc(c.status)+'</span><h2>'+esc(c.title)+'</h2><p><b>Owner:</b> '+esc(c.owner)+'</p><p>'+esc(c.notes)+'</p><button onclick="completeCloseout(\''+c.id+'\')">Complete</button></section>').join("")+'</div>'},
daily(){view.innerHTML='<h1>Daily Work</h1><section class="card"><h2>Add Action</h2><input id="actProject" value="Wylie"><input id="actTitle" placeholder="Action item"><select id="actPriority"><option>High</option><option>Medium</option><option>Low</option></select><input id="actDue" placeholder="Today / date"><button onclick="addAction()">Save Action</button></section><div class="grid">'+db.actions.map(a=>'<section class="card"><span class="badge">'+esc(a.project)+' / '+esc(a.priority)+'</span><h2>'+esc(a.title)+'</h2><p><b>Due:</b> '+esc(a.due)+'</p><p><b>Status:</b> '+esc(a.status)+'</p><button onclick="completeAction(\''+a.id+'\')">Complete</button></section>').join("")+'</div><section class="card"><h2>Field / Meeting Log</h2><input id="logProject" value="Wylie"><textarea id="logText" placeholder="What happened today?"></textarea><button onclick="addLog()">Save Log</button></section>'},
field(){let high=[...db.startup.filter(t=>t.status=="Blocked"),...db.punch.filter(p=>p.status!="Closed"),...db.closeout.filter(c=>c.status!="Complete")];view.innerHTML='<h1>Field Mode</h1><div class="grid">'+high.map(x=>'<section class="card"><span class="badge">'+esc(x.project||"Project")+' / '+esc(x.item||x.status||"")+'</span><h2>'+esc(x.title||x.description||x.issue)+'</h2><p>'+esc(x.status||"Open")+'</p><p>'+esc(x.blocker||x.notes||"")+'</p></section>').join("")+'</div>'},
equipment(){view.innerHTML='<h1>Equipment DNA</h1><section class="card"><input id="eqSearch" placeholder="Search item, model, project..." oninput="renderEquipment()"><button onclick="showAddEquipment()">Add Equipment</button></section><div id="eqList"></div>';renderEquipment()},
startup(){let b=db.startup.filter(t=>t.status=="Blocked").length;view.innerHTML='<h1>Startup Center</h1><div class="grid">'+stat("Tasks",db.startup.length,"Total")+stat("Blocked",b,"Need action","red")+'</div><section class="card"><h2>Add Startup Task</h2><input id="stProject" value="Wylie"><input id="stItem" placeholder="Item"><input id="stTitle" placeholder="Task"><select id="stDiscipline"><option>Electrical</option><option>Plumbing</option><option>Gas</option><option>Fire Suppression</option><option>Refrigeration</option><option>Architect / GC</option><option>Hood / Electrical</option></select><select id="stStatus"><option>Blocked</option><option>Ready</option><option>Scheduled</option><option>Complete</option></select><textarea id="stBlocker" placeholder="Blocker"></textarea><button onclick="addStartup()">Save</button></section><div class="grid">'+db.startup.map(t=>'<section class="card"><span class="badge">'+esc(t.project)+' / '+esc(t.item)+'</span><h2>'+esc(t.title)+'</h2><p>'+esc(t.discipline)+'</p><p class="'+(t.status=="Blocked"?"red":"green")+'"><b>'+esc(t.status)+'</b></p><p>'+esc(t.blocker)+'</p></section>').join("")+'</div>'},
delivery(){view.innerHTML='<h1>Delivery Check-In</h1><p class="muted">Delivery records are protected by snapshots in v2.0.</p>'},
punch(){view.innerHTML='<h1>Punch List</h1><section class="card"><h2>Add Punch</h2><input id="pProject" value="Wylie"><input id="pItem" placeholder="Item"><input id="pTitle" placeholder="Punch item"><input id="pTrade" placeholder="Trade"><select id="pPriority"><option>High</option><option>Medium</option><option>Low</option></select><textarea id="pNotes" placeholder="Notes"></textarea><button onclick="addPunch()">Save Punch</button></section><div class="grid">'+db.punch.map(p=>'<section class="card"><span class="badge">'+esc(p.project)+' / '+esc(p.item)+' / '+esc(p.priority)+'</span><h2>'+esc(p.title)+'</h2><p><b>Trade:</b> '+esc(p.trade)+'</p><p><b>Status:</b> '+esc(p.status)+'</p><p>'+esc(p.notes)+'</p><button onclick="closePunch(\''+p.id+'\')">Close</button></section>').join("")+'</div>'},
warranty(){view.innerHTML='<h1>Warranty / Service Log</h1><div class="grid">'+db.warranty.map(w=>'<section class="card"><span class="badge">'+esc(w.project)+' / '+esc(w.item)+'</span><h2>'+esc(w.issue)+'</h2><p>'+esc(w.status)+'</p><p>'+esc(w.notes)+'</p></section>').join("")+'</div>'},
kitchen(){view.innerHTML='<h1>Digital Kitchen</h1><div class="floor">'+db.equipment.map(e=>'<a class="eqnode '+(e.status.includes("Blocked")?"blocked":e.status.includes("Ready")?"ready":"review")+'" style="left:'+e.x+'px;top:'+e.y+'px" href="#equipment" onclick="setTimeout(()=>openEquipment(\''+e.item+'\'),50)"><b>'+esc(e.item)+'</b><br>'+esc(e.name)+'<br><small>'+esc(e.status)+'</small></a>').join("")+'</div>'},
documents(){view.innerHTML='<h1>Documents</h1><div class="grid">'+db.documents.map(d=>'<section class="card"><span class="badge">'+esc(d.project)+' / '+esc(d.type)+'</span><h2>'+esc(d.name)+'</h2><p>Linked item: '+esc(d.linkedItem)+'</p><p>'+esc(d.status)+'</p><p>'+esc(d.notes)+'</p></section>').join("")+'</div>'},
snapshots(){let s=getSnapshots().slice().reverse();view.innerHTML='<h1>Backup / Restore Tools</h1><section class="card"><p>Snapshots are stored locally in this browser before major changes and when you create them.</p><button onclick="createSnapshot(\'Manual snapshot\'); views.snapshots()">Create Snapshot</button><button onclick="exportData()">Export JSON Backup</button></section><div class="grid">'+s.map(x=>'<section class="card"><span class="badge">'+esc(x.reason)+'</span><h2>'+esc(x.date)+'</h2><button onclick="restoreSnapshot(\''+x.id+'\')">Restore This</button></section>').join("")+'</div>'},
reports(){let b=db.startup.filter(t=>t.status=="Blocked");let c=db.closeout.filter(x=>x.status!="Complete");view.innerHTML='<h1>Reports</h1><section class="card"><h2>Daily PM Brief</h2><p><b>Blocked startup:</b> '+b.length+'</p><p><b>Open closeout:</b> '+c.length+'</p><ul>'+b.map(t=>'<li>'+esc(t.project)+' item '+esc(t.item)+': '+esc(t.title)+' — '+esc(t.blocker)+'</li>').join("")+'</ul><button onclick="copyReport()">Copy Report</button></section>'},
settings(){view.innerHTML='<h1>Settings</h1><section class="card"><p><b>App version:</b> '+APP_VERSION+'</p><p><b>Last backup:</b> '+(db.settings?.lastBackup||"Never")+'</p><p><b>Auto snapshot:</b> '+(db.settings.autoSnapshot!==false?"On":"Off")+'</p><button onclick="exportData()">Export Backup</button><button onclick="toggleSnapshots()">Toggle Auto Snapshot</button><button class="redbtn" onclick="resetData()">Reset Data</button></section>'}
};
function renderEquipment(){let q=(document.getElementById("eqSearch")?.value||"").toLowerCase();let list=db.equipment.filter(e=>JSON.stringify(e).toLowerCase().includes(q));document.getElementById("eqList").innerHTML='<div class="grid">'+list.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / Item '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p>'+esc(e.manufacturer)+' '+esc(e.model)+'</p><p><b>Status:</b> '+esc(e.status)+'</p><p><b>Startup:</b> '+esc(e.startupStatus)+'</p><button onclick="openEquipment(\''+e.item+'\')">Open / Edit</button></section>').join("")+'</div>'}
function openEquipment(item){let e=db.equipment.find(x=>x.item==item);if(!e)return;view.innerHTML='<h1>Item '+esc(e.item)+' — '+esc(e.name)+'</h1><section class="card"><input id="eName" value="'+esc(e.name)+'"><input id="eStatus" value="'+esc(e.status)+'"><input id="eStartupStatus" value="'+esc(e.startupStatus)+'"><textarea id="eNotes">'+esc(e.notes)+'</textarea><button onclick="saveEquipment(\''+e.item+'\')">Save Equipment</button></section>'}
function saveEquipment(item){createSnapshot("Before equipment edit "+item);let e=db.equipment.find(x=>x.item==item);e.name=eName.value;e.status=eStatus.value;e.startupStatus=eStartupStatus.value;e.notes=eNotes.value;save();alert("Saved")}
function showAddEquipment(){view.innerHTML='<h1>Add Equipment</h1><section class="card"><input id="newProject" value="Wylie"><input id="newItem" placeholder="Item"><input id="newName" placeholder="Name"><input id="newMfr" placeholder="Manufacturer"><input id="newModel" placeholder="Model"><textarea id="newStatus">Review</textarea><button onclick="addEquipment()">Save</button></section>'}
function addEquipment(){createSnapshot("Before adding equipment");db.equipment.push({item:newItem.value,project:newProject.value,name:newName.value,manufacturer:newMfr.value,model:newModel.value,status:newStatus.value,startupStatus:"Pending",notes:"",x:80,y:80});save();location.hash="equipment";route()}
function addStartup(){createSnapshot("Before adding startup task");db.startup.push({id:uid(),project:stProject.value,item:stItem.value,title:stTitle.value,discipline:stDiscipline.value,status:stStatus.value,blocker:stBlocker.value});save();views.startup()}
function addAction(){createSnapshot("Before adding action");db.actions.push({id:uid(),project:actProject.value,title:actTitle.value,priority:actPriority.value,status:"Open",owner:"Rick",due:actDue.value});save();views.daily()}
function completeAction(id){createSnapshot("Before completing action");let a=db.actions.find(x=>x.id==id);if(a)a.status="Complete";save();views.daily()}
function addLog(){createSnapshot("Before adding log");db.logs.push({id:uid(),date:new Date().toLocaleString(),project:logProject.value,text:logText.value});save();views.daily()}
function addPunch(){createSnapshot("Before adding punch");db.punch.push({id:uid(),project:pProject.value,item:pItem.value,title:pTitle.value,trade:pTrade.value,status:"Open",priority:pPriority.value,notes:pNotes.value});save();views.punch()}
function closePunch(id){createSnapshot("Before closing punch");let p=db.punch.find(x=>x.id==id);if(p)p.status="Closed";save();views.punch()}
function addCloseout(){createSnapshot("Before adding closeout");db.closeout.push({id:uid(),project:coProject.value,title:coTitle.value,status:coStatus.value,owner:coOwner.value,notes:coNotes.value});save();views.closeout()}
function completeCloseout(id){createSnapshot("Before completing closeout");let c=db.closeout.find(x=>x.id==id);if(c)c.status="Complete";save();views.closeout()}
function askBrain(){let project=brainProject.value;let s=projectStats(project);let missing=missingDocs(project);brainAnswer.textContent=JSON.stringify({project,answer:project+" readiness is "+s.ready+"%. You have "+s.blocked.length+" blocked startup item(s), "+s.close.length+" open closeout item(s), and missing docs: "+missing.join(", "),openActions:s.actions,blockedTasks:s.blocked,openCloseout:s.close,missingDocuments:missing,recommendedActions:[...s.actions.map(a=>"Do action: "+a.title),...s.blocked.map(t=>"Resolve "+t.discipline+" blocker for item "+t.item+": "+t.title),...s.close.map(c=>"Closeout: "+c.title)]},null,2)}
function restoreSnapshot(id){let s=getSnapshots().find(x=>x.id==id);if(!s)return;if(confirm("Restore this snapshot? Current data will be replaced.")){localStorage.setItem(DATA_KEY,JSON.stringify(s.data));db=loadDb();migrateData();route();alert("Restored")}}
function toggleSnapshots(){db.settings.autoSnapshot=!db.settings.autoSnapshot;save();views.settings()}
function copyReport(){let b=db.startup.filter(t=>t.status=="Blocked");let c=db.closeout.filter(x=>x.status!="Complete");let text="KINTA Daily PM Brief\n\nBlocked startup: "+b.length+"\nOpen closeout: "+c.length+"\n"+b.map(t=>"- "+t.project+" item "+t.item+": "+t.title+" — "+t.blocker).join("\n");navigator.clipboard.writeText(text);alert("Copied")}
function exportData(){let today=new Date().toISOString().slice(0,10);db.settings.lastBackup=today;save();let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kinta-backup-"+today+".json";a.click();route()}
function importData(evt){let file=evt.target.files[0];if(!file)return;createSnapshot("Before import");let reader=new FileReader();reader.onload=()=>{db=JSON.parse(reader.result);migrateData();save();route();alert("Imported")};reader.readAsText(file)}
function resetData(){if(confirm("Reset all KINTA data?")){createSnapshot("Before reset");localStorage.removeItem(DATA_KEY);db=deepCopy(seed);migrateData();save();route()}}
route();
</script>
</body>
