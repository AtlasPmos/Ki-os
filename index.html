<!doctype html>
<html>
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>KINTA-OS v2.2</title>
<style>
body{margin:0;background:#0f172a;color:#e5e7eb;font-family:Arial}
header{background:#020617;padding:14px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;gap:8px}
.app{display:grid;grid-template-columns:255px 1fr;min-height:calc(100vh - 55px)}
nav{background:#020617;border-right:1px solid #334155;padding:16px}
nav a{display:block;color:#cbd5e1;text-decoration:none;padding:10px;border-radius:10px;margin-bottom:6px}
nav a:hover,nav a.active{background:#1e293b;color:white}
main{padding:22px}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:14px}
.card{background:#111827;border:1px solid #334155;border-radius:16px;padding:16px;margin-bottom:14px}
.badge{display:inline-block;border-radius:999px;padding:5px 10px;background:#1e293b;color:#38bdf8;font-size:12px}
.muted{color:#94a3b8}.red{color:#ef4444}.yellow{color:#f59e0b}.green{color:#22c55e}.blue{color:#38bdf8}
button{background:#2563eb;color:white;border:0;border-radius:10px;padding:10px 12px;margin:4px}
button.gray{background:#334155}button.redbtn{background:#dc2626}
input,select,textarea{width:100%;padding:10px;border-radius:10px;border:1px solid #334155;background:#020617;color:white;margin:6px 0 12px}
.floor{height:580px;background:#1e293b;border:1px solid #334155;border-radius:16px;position:relative;overflow:auto;background-image:linear-gradient(#334155 1px,transparent 1px),linear-gradient(90deg,#334155 1px,transparent 1px);background-size:40px 40px}
.eqnode{position:absolute;background:#020617;border:2px solid #38bdf8;border-radius:12px;padding:10px;width:165px;min-height:82px;color:white;text-decoration:none}
.eqnode.blocked{border-color:#ef4444}.eqnode.ready{border-color:#22c55e}.eqnode.review{border-color:#f59e0b}.eqnode.complete{border-color:#22c55e;background:#052e16}.eqnode.scheduled{border-color:#38bdf8}
pre{white-space:pre-wrap;background:#020617;border:1px solid #334155;border-radius:12px;padding:12px}
.progress{height:12px;background:#020617;border:1px solid #334155;border-radius:999px;overflow:hidden}.bar{height:100%;background:#22c55e}
@media(max-width:800px){.app{grid-template-columns:1fr}nav{display:flex;overflow:auto;gap:6px;border-right:0;border-bottom:1px solid #334155}nav a{white-space:nowrap}.floor{height:520px}}
</style>
</head>
<body>
<header>
  <div><b>KINTA-OS v2.2</b> <span class="muted">PM Assistant + Inspection Readiness</span></div>
  <div><button onclick="exportData()">Export Backup</button><button onclick="document.getElementById('importFile').click()">Import</button><input id="importFile" type="file" accept=".json" style="display:none" onchange="importData(event)"></div>
</header>
<div class="app"><nav id="nav"></nav><main id="view"></main></div>
<script>
const APP_VERSION="2.2.0";
const DATA_KEY="kintaData";
const SNAPSHOT_KEY="kintaSnapshots";
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36)}
const seed={meta:{appVersion:APP_VERSION,dataVersion:4,lastMigration:""},settings:{lastBackup:"",dailyReminder:true,autoSnapshot:true},
projects:[
{name:"Wylie",location:"Pittsburgh, PA",health:78,status:"Active",focus:"Startup readiness, hood commissioning, health inspection readiness",milestone:"Operational readiness / health inspection path",next:"Confirm MEP readiness and hood commissioning checklist.",inspection:"2026-08-19",readiness:"2026-08-05"},
{name:"Galaxy",location:"Hillsboro, OR",health:64,status:"Permit / ANSUL",focus:"ANSUL permit comments, AOR conformance, oven suppression clarification",milestone:"ANSUL permit approval",next:"Get AOR general conformance note and oven suppression response.",inspection:"",readiness:""}
],
equipment:[
{item:"2170",project:"Wylie",name:"Mega Top Prep Refrigerator",manufacturer:"Kintera / TriMark",model:"KS48 / KS48Z",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",status:"Blocked",statusColor:"blocked",deliveryStatus:"Set / verify",installStatus:"MEP pending",startupStatus:"Not ready",warrantyStatus:"Pending turnover",healthReady:"No",notes:"Verify receptacle location and startup readiness.",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely; verify packaging",elevator:"Verify",crane:"No",x:70,y:100},
{item:"2168",project:"Wylie",name:"Undercounter Freezer",manufacturer:"Kintera / TriMark",model:"KUC48F / KUC48FZ",area:"Cookline",level:"Level 3",power:"120V/1PH, NEMA 5-15P",status:"Ready",statusColor:"ready",deliveryStatus:"Set / verify",installStatus:"Ready",startupStatus:"No factory startup",warrantyStatus:"Pending turnover",healthReady:"Yes",notes:"No remote refrigeration piping required.",dimensions:"48in W x verify D/H",weight:"Verify",doorClearance:"Standard door likely",elevator:"Verify",crane:"No",x:270,y:100},
{item:"0063",project:"Galaxy",name:"Combi Oven, Electric",manufacturer:"Alto-Shaam",model:"6-10E PRO",area:"Cookline",level:"Main",power:"208-240V/3PH",status:"Blocked",statusColor:"blocked",deliveryStatus:"Pending install coordination",installStatus:"Blocked by ANSUL permit",startupStatus:"Blocked",warrantyStatus:"Manufacturer",healthReady:"No",notes:"Use for ANSUL permit response. Architect general conformance still needed.",dimensions:"Verify from submittal",weight:"608 lb listed on schedule",doorClearance:"Verify clear path within 5 ft for install program",elevator:"Verify",crane:"No",x:70,y:320}
],
startup:[
{id:uid(),project:"Wylie",item:"2170",title:"Verify electrical receptacle and MEP readiness",discipline:"Electrical",status:"Blocked",blocker:"Field verification required"},
{id:uid(),project:"Wylie",item:"Hood",title:"Complete hood commissioning checklist",discipline:"Hood / Electrical",status:"Blocked",blocker:"Checklist must be complete before scheduling tech"},
{id:uid(),project:"Galaxy",item:"0063",title:"Resolve ANSUL permit comment for oven suppression",discipline:"Fire Suppression",status:"Blocked",blocker:"City requested clarification"}
],
documents:[],actions:[
{id:uid(),project:"Galaxy",title:"Send ANSUL permit response follow-up",priority:"High",status:"Open",owner:"Rick",due:"Today"},
{id:uid(),project:"Wylie",title:"Confirm hood commissioning checklist status",priority:"High",status:"Open",owner:"Rick",due:"Today"}
],deliveries:[],punch:[],warranty:[],photos:[],logs:[],closeout:[],reviews:[]};

function deepCopy(o){return JSON.parse(JSON.stringify(o))}
function getSnapshots(){return JSON.parse(localStorage.getItem(SNAPSHOT_KEY)||"[]")}
function setSnapshots(s){localStorage.setItem(SNAPSHOT_KEY,JSON.stringify(s.slice(-10)))}
function createSnapshot(reason){if(!db||!db.settings||db.settings.autoSnapshot===false)return;let s=getSnapshots();s.push({id:uid(),date:new Date().toLocaleString(),reason:reason||"Auto snapshot",data:deepCopy(db)});setSnapshots(s)}
function loadDb(){let raw=localStorage.getItem(DATA_KEY);if(!raw)return deepCopy(seed);try{return JSON.parse(raw)}catch(e){return deepCopy(seed)}}
let db=loadDb();
function save(){localStorage.setItem(DATA_KEY,JSON.stringify(db))}
function migrateData(){if(!db.meta)db.meta={};if(!db.settings)db.settings={lastBackup:"",dailyReminder:true,autoSnapshot:true};["projects","equipment","startup","documents","actions","deliveries","punch","warranty","photos","logs","closeout","reviews"].forEach(k=>{if(!db[k])db[k]=[]});db.equipment.forEach((e,i)=>{if(!e.statusColor){let st=String(e.status||"").toLowerCase();e.statusColor=st.includes("blocked")?"blocked":st.includes("ready")?"ready":st.includes("complete")?"complete":"review"};if(!e.x)e.x=70+(i%3)*200;if(!e.y)e.y=100+Math.floor(i/3)*180;if(!e.deliveryStatus)e.deliveryStatus="Verify";if(!e.installStatus)e.installStatus="Verify";if(!e.startupStatus)e.startupStatus="Verify";if(!e.warrantyStatus)e.warrantyStatus="Verify";if(!e.healthReady)e.healthReady="Verify"});db.meta.appVersion=APP_VERSION;db.meta.dataVersion=4;db.meta.lastMigration=new Date().toLocaleString();save()}
migrateData();
function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","'":"&#039;",'"':"&quot;"}[m]))}
const routes=[["dashboard","Dashboard"],["assistant","PM Assistant"],["inspection","Inspection"],["kitchen","Digital Kitchen"],["move","Move Equipment"],["equipment","Equipment DNA"],["workflow","Workflow"],["brain","Project Brain"],["startup","Startup"],["readiness","Readiness"],["snapshots","Backups"],["settings","Settings"]];
function nav(){let r=location.hash.slice(1)||"dashboard";document.getElementById("nav").innerHTML=routes.map(x=>'<a class="'+(r==x[0]?'active':'')+'" href="#'+x[0]+'">'+x[1]+'</a>').join("")}
function stat(t,v,n,c){return '<section class="card"><h2>'+t+'</h2><p class="'+(c||'')+'" style="font-size:36px;margin:0">'+v+'</p><p class="muted">'+n+'</p></section>'}
function route(){nav();(views[location.hash.slice(1)||"dashboard"]||views.dashboard)()}
window.onhashchange=route;
function projectStats(project){let eq=db.equipment.filter(e=>e.project==project);let blocked=db.startup.filter(t=>t.project==project&&t.status=="Blocked");let openActions=db.actions.filter(a=>a.project==project&&a.status=="Open");let notHealth=eq.filter(e=>String(e.healthReady).toLowerCase()!=="yes");let missingDocs=inspectionMissing(project);let ready=Math.max(0,100-(blocked.length*18)-(openActions.length*8)-(notHealth.length*10)-(missingDocs.length*8));return{eq,blocked,openActions,notHealth,missingDocs,ready}}
function inspectionMissing(project){let required=["hood","ansul","startup","warranty","manual","health"];let docs=db.documents.filter(d=>d.project==project).map(d=>(d.name+" "+d.type+" "+d.notes).toLowerCase());return required.filter(r=>!docs.some(d=>d.includes(r)))}
function assistantPlan(project){let s=projectStats(project);let actions=[];s.openActions.forEach(a=>actions.push("Action: "+a.title));s.blocked.forEach(t=>actions.push("Resolve "+t.discipline+" blocker for "+t.item+": "+t.title));s.notHealth.forEach(e=>actions.push("Health readiness check: "+e.item+" "+e.name+" is "+e.healthReady));s.missingDocs.forEach(d=>actions.push("Missing readiness document/check: "+d));return{project,readiness:s.ready,summary:project+" readiness is "+s.ready+"%. "+s.blocked.length+" startup blockers, "+s.openActions.length+" open actions, "+s.notHealth.length+" health readiness concerns.",today:actions.slice(0,8),risks:[...s.blocked.map(t=>t.blocker),...s.missingDocs.map(d=>"Missing "+d+" record")],equipmentNotReady:s.notHealth}}
const views={
dashboard(){let blocked=db.startup.filter(t=>t.status=="Blocked").length;let actions=db.actions.filter(a=>a.status=="Open").length;let noHealth=db.equipment.filter(e=>String(e.healthReady).toLowerCase()!=="yes").length;view.innerHTML='<span class="badge">v2.2 PM Assistant</span><h1>Atlas Command Center</h1><div class="grid">'+stat("Equipment",db.equipment.length,"DNA records")+stat("Open Actions",actions,"PM work","yellow")+stat("Blocked Startup",blocked,"Action needed","red")+stat("Inspection Concerns",noHealth,"Not health-ready","red")+stat("Snapshots",getSnapshots().length,"Restore points","blue")+'</div><section class="card"><h2>Use Today</h2><button onclick="location.hash=\'assistant\'">PM Assistant</button><button onclick="location.hash=\'inspection\'">Inspection Readiness</button><button onclick="location.hash=\'kitchen\'">Digital Kitchen</button></section>'},
assistant(){view.innerHTML='<h1>PM Assistant</h1><section class="card"><select id="asProject">'+db.projects.map(p=>'<option>'+p.name+'</option>').join("")+'</select><button onclick="runAssistant()">What should I do today?</button></section><section class="card"><pre id="asAnswer">Run assistant.</pre></section>'},
inspection(){view.innerHTML='<h1>Inspection Readiness</h1><div class="grid">'+db.projects.map(p=>{let s=projectStats(p.name);return '<section class="card"><h2>'+esc(p.name)+'</h2><p><b>Inspection readiness:</b> '+s.ready+'%</p><div class="progress"><div class="bar" style="width:'+s.ready+'%"></div></div><p class="'+(s.blocked.length?'red':'green')+'">Startup blockers: '+s.blocked.length+'</p><p class="'+(s.notHealth.length?'red':'green')+'">Equipment not health-ready: '+s.notHealth.length+'</p><p>Missing checks/docs: '+s.missingDocs.join(", ")+'</p><button onclick="openInspectionProject(\''+p.name+'\')">Open Detail</button></section>'}).join("")+'</div>'},
kitchen(){view.innerHTML='<h1>Digital Kitchen 2.2</h1><p class="muted">Tap equipment to open/edit. Red = blocked, green = ready/complete, yellow = review.</p><div class="floor">'+db.equipment.map(e=>'<a class="eqnode '+esc(e.statusColor)+'" style="left:'+e.x+'px;top:'+e.y+'px" href="#equipment" onclick="setTimeout(()=>openEquipment(\''+e.item+'\'),50)"><b>'+esc(e.item)+'</b><br>'+esc(e.name)+'<br><small>'+esc(e.status)+' / health: '+esc(e.healthReady)+'</small></a>').join("")+'</div>'},
move(){view.innerHTML='<h1>Move Equipment on Digital Kitchen</h1><section class="card"><select id="mvItem">'+db.equipment.map(e=>'<option>'+esc(e.item)+'</option>').join("")+'</select><input id="mvX" placeholder="X position"><input id="mvY" placeholder="Y position"><button onclick="moveEquipment()">Move</button></section><div class="grid">'+db.equipment.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p>X: '+esc(e.x)+' | Y: '+esc(e.y)+'</p></section>').join("")+'</div>'},
equipment(){view.innerHTML='<h1>Equipment DNA</h1><section class="card"><input id="eqSearch" placeholder="Search item, model, project..." oninput="renderEquipment()"><button onclick="showAddEquipment()">Add Equipment</button></section><div id="eqList"></div>';renderEquipment()},
workflow(){view.innerHTML='<h1>Equipment Workflow</h1><section class="card"><select id="wfItem">'+db.equipment.map(e=>'<option>'+esc(e.item)+'</option>').join("")+'</select><select id="wfStatus"><option>Blocked</option><option>Review</option><option>Ready</option><option>Scheduled</option><option>Complete</option></select><select id="wfHealth"><option>Verify</option><option>No</option><option>Yes</option></select><input id="wfDelivery" placeholder="Delivery status"><input id="wfInstall" placeholder="Install status"><input id="wfStartup" placeholder="Startup status"><button onclick="updateWorkflow()">Update Workflow</button></section><div class="grid">'+db.equipment.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p>Status: '+esc(e.status)+'</p><p>Health Ready: '+esc(e.healthReady)+'</p><p>Startup: '+esc(e.startupStatus)+'</p></section>').join("")+'</div>'},
brain(){view.innerHTML='<h1>Project Brain</h1><section class="card"><select id="brainProject">'+db.projects.map(p=>'<option>'+p.name+'</option>').join("")+'</select><button onclick="askBrain()">Ask: What is blocking me?</button></section><section class="card"><pre id="brainAnswer">Ask a question.</pre></section>'},
startup(){let b=db.startup.filter(t=>t.status=="Blocked").length;view.innerHTML='<h1>Startup Center</h1><div class="grid">'+stat("Tasks",db.startup.length,"Total")+stat("Blocked",b,"Need action","red")+'</div><section class="card"><input id="stProject" value="Wylie"><input id="stItem" placeholder="Item"><input id="stTitle" placeholder="Task"><select id="stDiscipline"><option>Electrical</option><option>Plumbing</option><option>Gas</option><option>Fire Suppression</option><option>Refrigeration</option><option>Hood / Electrical</option></select><select id="stStatus"><option>Blocked</option><option>Ready</option><option>Scheduled</option><option>Complete</option></select><textarea id="stBlocker" placeholder="Blocker"></textarea><button onclick="addStartup()">Save</button></section><div class="grid">'+db.startup.map(t=>'<section class="card"><span class="badge">'+esc(t.project)+' / '+esc(t.item)+'</span><h2>'+esc(t.title)+'</h2><p>'+esc(t.discipline)+'</p><p class="'+(t.status=="Blocked"?"red":"green")+'"><b>'+esc(t.status)+'</b></p><p>'+esc(t.blocker)+'</p></section>').join("")+'</div>'},
readiness(){view.innerHTML='<h1>Readiness</h1><div class="grid">'+db.projects.map(p=>{let s=projectStats(p.name);return '<section class="card"><h2>'+esc(p.name)+'</h2><p><b>Readiness:</b> '+s.ready+'%</p><div class="progress"><div class="bar" style="width:'+s.ready+'%"></div></div><p>Equipment: '+s.eq.length+'</p><p class="'+(s.blocked.length?'red':'green')+'">Blocked startup: '+s.blocked.length+'</p></section>'}).join("")+'</div>'},
snapshots(){let s=getSnapshots().slice().reverse();view.innerHTML='<h1>Backup / Restore</h1><section class="card"><button onclick="createSnapshot(\'Manual snapshot\');views.snapshots()">Create Snapshot</button><button onclick="exportData()">Export JSON Backup</button></section><div class="grid">'+s.map(x=>'<section class="card"><span class="badge">'+esc(x.reason)+'</span><h2>'+esc(x.date)+'</h2><button onclick="restoreSnapshot(\''+x.id+'\')">Restore</button></section>').join("")+'</div>'},
settings(){view.innerHTML='<h1>Settings</h1><section class="card"><p>App version: '+APP_VERSION+'</p><p>Last backup: '+(db.settings.lastBackup||"Never")+'</p><button onclick="exportData()">Export Backup</button><button onclick="resetData()">Reset Data</button></section>'}
};
function renderEquipment(){let q=(document.getElementById("eqSearch")?.value||"").toLowerCase();let list=db.equipment.filter(e=>JSON.stringify(e).toLowerCase().includes(q));document.getElementById("eqList").innerHTML='<div class="grid">'+list.map(e=>'<section class="card"><span class="badge">'+esc(e.project)+' / '+esc(e.item)+'</span><h2>'+esc(e.name)+'</h2><p>'+esc(e.manufacturer)+' '+esc(e.model)+'</p><p>Status: '+esc(e.status)+'</p><p>Health: '+esc(e.healthReady)+'</p><button onclick="openEquipment(\''+e.item+'\')">Open / Edit</button></section>').join("")+'</div>'}
function openEquipment(item){let e=db.equipment.find(x=>x.item==item);if(!e)return;view.innerHTML='<h1>Item '+esc(e.item)+' — '+esc(e.name)+'</h1><section class="card"><input id="eName" value="'+esc(e.name)+'"><input id="eMfr" value="'+esc(e.manufacturer)+'"><input id="eModel" value="'+esc(e.model)+'"><select id="eStatus"><option>Blocked</option><option>Review</option><option>Ready</option><option>Scheduled</option><option>Complete</option></select><select id="eHealth"><option>Verify</option><option>No</option><option>Yes</option></select><input id="eStartupStatus" value="'+esc(e.startupStatus)+'"><textarea id="eNotes">'+esc(e.notes)+'</textarea><button onclick="saveEquipment(\''+e.item+'\')">Save Equipment</button></section>';eStatus.value=e.status;eHealth.value=e.healthReady}
function saveEquipment(item){createSnapshot("Before equipment edit "+item);let e=db.equipment.find(x=>x.item==item);e.name=eName.value;e.manufacturer=eMfr.value;e.model=eModel.value;e.status=eStatus.value;e.statusColor=String(e.status).toLowerCase();e.healthReady=eHealth.value;e.startupStatus=eStartupStatus.value;e.notes=eNotes.value;save();alert("Saved");route()}
function showAddEquipment(){view.innerHTML='<h1>Add Equipment</h1><section class="card"><input id="newProject" value="Wylie"><input id="newItem" placeholder="Item"><input id="newName" placeholder="Name"><input id="newMfr" placeholder="Manufacturer"><input id="newModel" placeholder="Model"><textarea id="newStatus">Review</textarea><button onclick="addEquipment()">Save</button></section>'}
function addEquipment(){createSnapshot("Before adding equipment");db.equipment.push({item:newItem.value,project:newProject.value,name:newName.value,manufacturer:newMfr.value,model:newModel.value,status:newStatus.value,statusColor:String(newStatus.value).toLowerCase(),healthReady:"Verify",startupStatus:"Pending",deliveryStatus:"Pending",installStatus:"Pending",notes:"",x:80,y:80});save();location.hash="equipment";route()}
function moveEquipment(){createSnapshot("Before moving equipment");let e=db.equipment.find(x=>x.item==mvItem.value);if(e){e.x=parseInt(mvX.value||e.x);e.y=parseInt(mvY.value||e.y);save();views.move()}}
function updateWorkflow(){createSnapshot("Before workflow update");let e=db.equipment.find(x=>x.item==wfItem.value);if(e){e.status=wfStatus.value;e.statusColor=String(wfStatus.value).toLowerCase();e.healthReady=wfHealth.value;if(wfDelivery.value)e.deliveryStatus=wfDelivery.value;if(wfInstall.value)e.installStatus=wfInstall.value;if(wfStartup.value)e.startupStatus=wfStartup.value;save();views.workflow()}}
function addStartup(){createSnapshot("Before adding startup task");db.startup.push({id:uid(),project:stProject.value,item:stItem.value,title:stTitle.value,discipline:stDiscipline.value,status:stStatus.value,blocker:stBlocker.value});save();views.startup()}
function runAssistant(){asAnswer.textContent=JSON.stringify(assistantPlan(asProject.value),null,2)}
function askBrain(){let project=brainProject.value;brainAnswer.textContent=JSON.stringify(assistantPlan(project),null,2)}
function openInspectionProject(project){view.innerHTML='<h1>'+esc(project)+' Inspection Detail</h1><section class="card"><pre>'+esc(JSON.stringify(assistantPlan(project),null,2))+'</pre></section>'}
function restoreSnapshot(id){let s=getSnapshots().find(x=>x.id==id);if(!s)return;if(confirm("Restore this snapshot?")){localStorage.setItem(DATA_KEY,JSON.stringify(s.data));db=loadDb();migrateData();route();alert("Restored")}}
function exportData(){let today=new Date().toISOString().slice(0,10);db.settings.lastBackup=today;save();let blob=new Blob([JSON.stringify(db,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="kinta-backup-"+today+".json";a.click();route()}
function importData(evt){let file=evt.target.files[0];if(!file)return;createSnapshot("Before import");let reader=new FileReader();reader.onload=()=>{db=JSON.parse(reader.result);migrateData();save();route();alert("Imported")};reader.readAsText(file)}
function resetData(){if(confirm("Reset all KINTA data?")){createSnapshot("Before reset");localStorage.removeItem(DATA_KEY);db=deepCopy(seed);migrateData();save();route()}}
route();
</script>
</body>
</html>
